<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayZ Types Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0f14;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(101, 67, 33, 0.1) 0px, rgba(101, 67, 33, 0.1) 2px, 
                                          rgba(70, 40, 20, 0.1) 2px, rgba(70, 40, 20, 0.1) 4px),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 L 90 10 M10 20 L 90 20 M10 30 L 90 30 M10 40 L 90 40 M10 50 L 90 50 M10 60 L 90 60 M10 70 L 90 70 M10 80 L 90 80 M10 90 L 90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/><path d="M10 10 L 10 90 M20 10 L 20 90 M30 10 L 30 90 M40 10 L 40 90 M50 10 L 50 90 M60 10 L 60 90 M70 10 L 70 90 M80 10 L 80 90 M90 10 L 90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/></svg>');
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 100%; height: 100%; margin: 0 auto;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(5px);
            border: 2px solid #7a5c3a; border-radius: 8px;
            padding: 20px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(101, 67, 33, 0.3);
            position: relative;
        }
        .container::before {
            content: ""; position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 2px solid rgba(170, 110, 40, 0.3); border-radius: 10px;
            pointer-events: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .container::after {
            content: ""; position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px dashed rgba(170, 110, 40, 0.2); border-radius: 4px;
            pointer-events: none;
        }
        
        .header {
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            color: #c49a6c; padding: 15px 20px; margin-bottom: 20px;
            border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.2), 0 5px 10px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }
        .header::before {
            content: ""; position: absolute; top: 5px; right: 5px;
            width: 30px; height: 30px;
            background: linear-gradient(135deg, transparent 50%, #7a5c3a 50%);
            opacity: 0.3;
        }
        .header h2 {
            font-size: 1.5em; font-weight: 600; margin: 0; color: #c49a6c;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 2px 2px 0 #3d2b1a;
            font-family: 'Segoe UI', monospace;
        }
        
        .load-definitions-btn {
            background: #1e2a3a; border: 2px solid #2a4a6b; color: #c49a6c;
            padding: 8px 15px; border-radius: 3px; cursor: pointer;
            font-size: 13px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Segoe UI', monospace; font-weight: 600;
            box-shadow: 0 3px 0 #1a2a3a, inset 0 1px 3px rgba(255,215,140,0.2);
            position: relative; overflow: hidden; transition: all 0.2s;
        }
        .load-definitions-btn::before {
            content: ""; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196,154,108,0.2), transparent);
            transition: left 0.3s;
        }
        .load-definitions-btn:hover::before { left: 100%; }
        .load-definitions-btn:hover { border-color: #3498db; transform: translateY(-2px); box-shadow: 0 5px 0 #1a2a3a, inset 0 1px 3px rgba(255,215,140,0.3); }
        .load-definitions-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a2a3a, inset 0 1px 3px rgba(255,215,140,0.2); }
        
        .main-content { display: flex; gap: 20px; flex: 1; min-height: 0; overflow: hidden; }
        
        .sidebar {
            width: 280px;
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            padding: 15px; border-radius: 5px; overflow-y: auto; flex-shrink: 0;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
        }
        .sidebar::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path d="M1 3 L1 4 M2 2 L2 3 M3 1 L3 2 M0 0 L0 1" stroke="%23aa6e40" stroke-width="0.5" opacity="0.1"/></svg>');
            pointer-events: none;
        }
        .sidebar h3 {
            color: #c49a6c; margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 2px solid #5a4a3a; font-size: 16px;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 1px 1px 0 #3d2b1a;
        }
        
        .editor { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: bold; margin-bottom: 3px;
            color: #b4a68a; text-transform: uppercase; letter-spacing: 1px;
        }
        .sidebar input[type="text"], .sidebar input[type="number"], .sidebar input[type="file"], .sidebar select {
            width: 100%; padding: 6px 5px; border: 1px solid #5a4a3a; border-radius: 3px;
            font-size: 13px; height: 32px; line-height: normal;
            background: #0f1a0f; color: #d4c8b0; font-family: 'Segoe UI', monospace;
        }
        .sidebar input[type="text"]:focus, .sidebar input[type="number"]:focus, .sidebar select:focus {
            outline: none; border-color: #c49a6c; box-shadow: 0 0 0 2px rgba(196, 154, 108, 0.2);
        }
        .sidebar input[type="number"] { -moz-appearance: textfield; }
        .sidebar input[type="number"]::-webkit-outer-spin-button,
        .sidebar input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .search-wrapper { display: flex; gap: 5px; margin-bottom: 15px; }
        .search-wrapper input {
            flex: 1; height: 32px; padding: 6px 5px;
            border: 1px solid #5a4a3a; border-radius: 3px; font-size: 13px;
            background: #0f1a0f; color: #d4c8b0; font-family: 'Segoe UI', monospace;
        }
        .search-wrapper input:focus { outline: none; border-color: #c49a6c; box-shadow: 0 0 0 2px rgba(196, 154, 108, 0.2); }
        .clear-search-btn {
            background: #3a1e1e; border: 2px solid #8b2a2a; color: #d4c8b0;
            width: 32px; height: 32px; border-radius: 3px; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; box-shadow: 0 2px 0 #2a1a1a; transition: all 0.2s;
        }
        .clear-search-btn:hover { border-color: #e74c3c; transform: translateY(-2px); box-shadow: 0 4px 0 #2a1a1a; }
        .clear-search-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #2a1a1a; }
        .clear-search-btn:disabled { background: #2a2a2a; border-color: #5a5a5a; cursor: not-allowed; opacity: 0.5; transform: none; box-shadow: 0 2px 0 #1a1a1a; }
        
        .mass-edit-panel { margin-bottom: 15px; }
        .mass-edit-panel .form-group { margin-bottom: 10px; }
        .mass-edit-panel .form-group:last-child { margin-bottom: 0; }
        .mass-edit-panel label { font-size: 11px; color: #b4a68a; margin-bottom: 2px; }
        .mass-edit-panel input { background: #0f1a0f; border-color: #5a4a3a; color: #d4c8b0; }
        .mass-edit-buttons { display: flex; gap: 8px; margin-top: 12px; }
        
        .mass-edit-btn {
            flex: 1; padding: 0 3px; border: 2px solid #5a4a3a; border-radius: 3px;
            cursor: pointer; font-size: 11px; height: 36px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1.2; white-space: normal; word-break: break-word;
            text-transform: uppercase; letter-spacing: 1px; font-family: 'Segoe UI', monospace;
            box-shadow: 0 3px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
            position: relative; overflow: hidden; transition: all 0.2s;
        }
        .mass-edit-btn::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196,154,108,0.2), transparent);
            transition: left 0.3s;
        }
        .mass-edit-btn:hover::before { left: 100%; }
        .mass-edit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.3); }
        .mass-edit-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2); }
        .mass-edit-btn.primary { background: #1e2a3a; border-color: #2a4a6b; color: #c49a6c; }
        .mass-edit-btn.primary:hover { border-color: #3498db; }
        .mass-edit-btn.danger { background: #3a1e1e; border-color: #8b2a2a; color: #d4c8b0; }
        .mass-edit-btn.danger:hover { border-color: #e74c3c; }
        
        .action-buttons { display: flex; gap: 8px; margin-top: 8px; }
        .action-buttons button {
            flex: 1; height: 36px; border: 2px solid #5a4a3a; border-radius: 3px;
            cursor: pointer; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px; font-family: 'Segoe UI', monospace;
            box-shadow: 0 3px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
            position: relative; overflow: hidden; transition: all 0.2s;
        }
        .action-buttons button::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196,154,108,0.2), transparent);
            transition: left 0.3s;
        }
        .action-buttons button:hover::before { left: 100%; }
        .action-buttons button:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.3); }
        .action-buttons button:active { transform: translateY(2px); box-shadow: 0 1px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2); }
        .add-btn { background: #1e3a1e; border-color: #2a6b2a; color: #c49a6c; }
        .add-btn:hover { border-color: #27ae60; }
        .clear-btn { background: #3a2a1e; border-color: #8b5a2a; color: #d4c8b0; }
        .clear-btn:hover { border-color: #e67e22; }
        
        .import-export-section { margin-top: 15px; }
        .import-btn, .export-btn {
            width: 100%; padding: 8px; border: 2px solid #5a4a3a; border-radius: 3px;
            cursor: pointer; font-size: 13px; margin-bottom: 5px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Segoe UI', monospace; font-weight: 600;
            box-shadow: 0 3px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
            position: relative; overflow: hidden; transition: all 0.2s;
        }
        .import-btn::before, .export-btn::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196,154,108,0.2), transparent);
            transition: left 0.3s;
        }
        .import-btn:hover::before, .export-btn:hover::before { left: 100%; }
        .import-btn:hover, .export-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.3); }
        .import-btn:active, .export-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2); }
        .export-btn { background: #1e2a3a; border-color: #2a4a6b; color: #c49a6c; }
        .export-btn:hover { border-color: #3498db; }
        .import-btn { background: #3a2a1e; border-color: #b87c3a; color: #d4c8b0; }
        .import-btn:hover { border-color: #f39c12; }
        
        .table-container {
            display: flex; flex-direction: column;
            border: 2px solid #5a4a3a; border-radius: 3px;
            background: #0f1a0f; flex: 1; overflow: hidden; contain: strict;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }
        .table-header {
            overflow: hidden; border-bottom: 2px solid #5a4a3a;
            background: #1e2b1e; flex-shrink: 0;
            padding-right: 34px; margin-right: -17px;
        }
        .table-body { overflow-x: auto; overflow-y: auto; flex: 1; will-change: transform; }
        .table-body::-webkit-scrollbar { width: 16px; height: 16px; background: #2a2a2a; }
        .table-body::-webkit-scrollbar-thumb { background: #5a5a5a; border-radius: 8px; border: 2px solid #2a2a2a; }
        .table-body::-webkit-scrollbar-thumb:hover { background: #7a7a7a; }
        .table-body::-webkit-scrollbar-track { background: #2a2a2a; }
        .table-body::-webkit-scrollbar-corner { background: #2a2a2a; }
        
        table { border-collapse: collapse; font-size: 12px; table-layout: fixed; width: 100%; min-width: 2000px; }
        th {
            background: #2a3a2a; color: #c49a6c; padding: 8px 4px;
            font-weight: 600; white-space: nowrap; text-align: center;
            position: relative; user-select: none; overflow: hidden;
            border-right: 1px solid #5a4a3a;
            text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
        }
        td {
            padding: 4px 2px; border-bottom: 1px solid #5a4a3a;
            border-right: 1px solid #3d2b1a; text-align: center;
            overflow: hidden; background: #1a251a; color: #d4c8b0;
        }
        tr { contain: content; }
        tr:hover td { background: #2a3a2a; }
        tr.selected td { background: #3d2b1a; }
        tr.hidden-by-search { display: none; }
        tr.validation-error td { border-bottom: 2px solid rgba(231, 76, 60, 0.5); }
        
        .checkbox-cell { text-align: center; }
        .checkbox-cell input { width: 14px; height: 14px; accent-color: #c49a6c; }
        .number-input, .text-input, .name-input {
            width: 100%; padding: 6px 4px; border: 1px solid #5a4a3a; border-radius: 2px;
            font-size: 11px; height: 28px; line-height: normal;
            background: #0f1a0f; color: #d4c8b0; font-family: 'Segoe UI', monospace;
        }
        .number-input:focus, .text-input:focus, .name-input:focus {
            outline: none; border-color: #c49a6c; box-shadow: 0 0 0 2px rgba(196, 154, 108, 0.2);
        }
        .number-input.invalid, .name-input.invalid {
            border-color: #e74c3c; box-shadow: 0 0 0 2px rgba(231, 76, 60, 0.2);
        }
        .number-input { text-align: center; -moz-appearance: textfield; }
        .number-input::-webkit-outer-spin-button, .number-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .text-input { text-align: left; }
        .name-input { text-align: left; }
        .flag-cell { text-align: center; }
        .flag-checkbox { width: 14px; height: 14px; accent-color: #c49a6c; }
        
        .field-with-button { display: flex; gap: 2px; width: 100%; }
        .field-with-button input {
            flex: 1; min-width: 0; padding: 6px 4px;
            border: 1px solid #5a4a3a; border-radius: 2px 0 0 2px;
            font-size: 11px; height: 28px; background: #0f1a0f; color: #d4c8b0;
        }
        .field-with-button button {
            width: 24px; padding: 0; background: #2a3a2a;
            border: 1px solid #5a4a3a; border-left: none;
            border-radius: 0 2px 2px 0; cursor: pointer;
            font-size: 11px; display: flex; align-items: center; justify-content: center;
            height: 28px; color: #c49a6c; transition: all 0.2s;
        }
        .field-with-button button:hover { background: #3a4a3a; border-color: #c49a6c; color: #d4c8b0; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(3px); z-index: 1000;
        }
        .modal.active { display: flex; justify-content: center; align-items: center; }
        .modal-content {
            background: #1e2b1e; border: 2px solid #7a5c3a; border-radius: 8px;
            width: 500px; max-width: 90%; max-height: 80vh; overflow-y: auto; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(101, 67, 33, 0.3);
            position: relative;
        }
        .modal-content::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path d="M1 3 L1 4 M2 2 L2 3 M3 1 L3 2 M0 0 L0 1" stroke="%23aa6e40" stroke-width="0.5" opacity="0.1"/></svg>');
            pointer-events: none;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #5a4a3a;
        }
        .modal-header h3 { font-size: 16px; color: #c49a6c; text-transform: uppercase; letter-spacing: 2px; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #7a5c3a; transition: color 0.2s; }
        .modal-close:hover { color: #e74c3c; }
        .selected-values { margin-bottom: 15px; padding: 10px; background: #0f1a0f; border: 1px solid #5a4a3a; border-radius: 3px; }
        .selected-values-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .selected-values-header span { color: #7a5c3a; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .clear-all-btn {
            background: none; border: 1px solid #5a4a3a; color: #d4c8b0;
            padding: 3px 10px; border-radius: 3px; cursor: pointer;
            font-size: 11px; text-transform: uppercase; transition: all 0.2s;
        }
        .clear-all-btn:hover { background: #3a1e1e; border-color: #e74c3c; }
        .selected-values-list { display: flex; flex-wrap: wrap; gap: 5px; min-height: 28px; }
        .selected-value-tag {
            display: inline-block; background: #2a3a2a; padding: 4px 10px; border-radius: 3px;
            border: 1px solid #5a4a3a; color: #c49a6c; font-size: 11px;
        }
        .selected-value-placeholder { color: #7a5c3a; font-style: italic; font-size: 11px; padding: 4px 0; }
        .modal-list {
            max-height: 300px; overflow-y: auto; border: 1px solid #5a4a3a;
            border-radius: 3px; margin-bottom: 15px; background: #0f1a0f;
        }
        .modal-list::-webkit-scrollbar { width: 12px; background: #0f1a0f; }
        .modal-list::-webkit-scrollbar-thumb { background: #5a4a3a; border-radius: 6px; border: 2px solid #0f1a0f; }
        .modal-item {
            padding: 8px 10px; border-bottom: 1px solid #3d2b1a; cursor: pointer;
            font-size: 12px; color: #d4c8b0; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .modal-item:hover { background: #2a3a2a; }
        .modal-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #c49a6c; cursor: pointer; }
        .modal-custom { display: flex; gap: 5px; margin-bottom: 15px; }
        .modal-custom input {
            flex: 1; padding: 8px; border: 1px solid #5a4a3a; border-radius: 3px;
            font-size: 12px; height: 36px; background: #0f1a0f; color: #d4c8b0;
            font-family: 'Segoe UI', monospace;
        }
        .modal-custom input:focus { outline: none; border-color: #c49a6c; }
        .modal-custom button {
            background: #1e3a1e; border: 2px solid #2a6b2a; color: #c49a6c;
            padding: 0 15px; border-radius: 3px; cursor: pointer; font-size: 12px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Segoe UI', monospace; font-weight: 600;
            box-shadow: 0 2px 0 #1a2a1a; transition: all 0.2s;
        }
        .modal-custom button:hover { border-color: #27ae60; transform: translateY(-2px); box-shadow: 0 4px 0 #1a2a1a; }
        .modal-custom button:active { transform: translateY(2px); box-shadow: 0 0 0 #1a2a1a; }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button {
            flex: 1; padding: 8px; border: 2px solid #5a4a3a; border-radius: 3px;
            cursor: pointer; font-size: 12px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Segoe UI', monospace; font-weight: 600;
            box-shadow: 0 3px 0 #3d2b1a; transition: all 0.2s;
        }
        .modal-save { background: #1e3a1e; border-color: #2a6b2a; color: #c49a6c; }
        .modal-save:hover { border-color: #27ae60; transform: translateY(-2px); box-shadow: 0 5px 0 #3d2b1a; }
        .modal-cancel { background: #3a1e1e; border-color: #8b2a2a; color: #d4c8b0; }
        .modal-cancel:hover { border-color: #e74c3c; transform: translateY(-2px); box-shadow: 0 5px 0 #3d2b1a; }
        
        .validation-tooltip {
            position: fixed; background: #3a1e1e; border: 1px solid #e74c3c;
            color: #df7d7d; padding: 6px 12px; border-radius: 3px;
            font-size: 11px; z-index: 2000; pointer-events: none;
            font-family: 'Segoe UI', monospace;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5); max-width: 300px;
        }
        
        @media (max-width: 1200px) { .main-content { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>TYPES EDITOR</h2>
            <button class="load-definitions-btn" id="loadDefinitionsBtn" title="Загрузить cfglimitsdefinition.xml">ЗАГРУЗИТЬ ОПРЕДЕЛЕНИЯ</button>
        </div>
        <div class="main-content">
            <div class="sidebar">
                <h3>ПОИСК</h3>
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Поиск по параметрам...">
                    <button class="clear-search-btn" id="clearSearchBtn" title="Очистить поиск" disabled>×</button>
                </div>
                
                <h3>МАССОВОЕ РЕДАКТИРОВАНИЕ</h3>
                <div class="mass-edit-panel">
                    <div class="form-group"><label>nominal:</label><input type="number" id="massNominal" placeholder="Оставить пустым"></div>
                    <div class="form-group"><label>lifetime:</label><input type="number" id="massLifetime" placeholder="Оставить пустым"></div>
                    <div class="form-group"><label>restock:</label><input type="number" id="massRestock" placeholder="Оставить пустым"></div>
                    <div class="form-group"><label>min:</label><input type="number" id="massMin" placeholder="Оставить пустым"></div>
                    <div class="form-group"><label>quantmin:</label><input type="number" id="massQuantmin" placeholder="Оставить пустым"></div>
                    <div class="form-group"><label>quantmax:</label><input type="number" id="massQuantmax" placeholder="Оставить пустым"></div>
                    <div class="form-group"><label>cost:</label><input type="number" id="massCost" placeholder="Оставить пустым"></div>
                    <div class="mass-edit-buttons">
                        <button class="mass-edit-btn primary" id="applyMassEditBtn">ПРИМЕНИТЬ</button>
                        <button class="mass-edit-btn danger" id="deleteSelectedBtn">УДАЛИТЬ</button>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="add-btn" id="addItemBtn">ДОБАВИТЬ</button>
                    <button class="clear-btn" id="clearAllBtn">ОЧИСТИТЬ</button>
                </div>
                <div class="import-export-section">
                    <button class="export-btn" id="exportBtn">СОХРАНИТЬ</button>
                    <button class="import-btn" id="importBtn">ЗАГРУЗИТЬ</button>
                </div>
            </div>
            <div class="editor">
                <div class="table-container">
                    <div class="table-header" id="tableHeader"><table><thead id="tableHeaderRow"></thead></table></div>
                    <div class="table-body" id="tableBody"><table><tbody id="tableBodyRows"></tbody></table></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="valueModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">ВЫБЕРИТЕ ЗНАЧЕНИЯ</h3>
                <button class="modal-close" id="modalCloseBtn">×</button>
            </div>
            <div class="selected-values">
                <div class="selected-values-header">
                    <span>ВЫБРАНО:</span>
                    <button class="clear-all-btn" id="clearAllSelectionsBtn">ОЧИСТИТЬ ВСЕ</button>
                </div>
                <div class="selected-values-list" id="selectedValuesList">
                    <span class="selected-value-placeholder">ничего не выбрано</span>
                </div>
            </div>
            <div class="modal-list" id="modalList"></div>
            <div class="modal-custom">
                <input type="text" id="modalCustomValue" placeholder="Свое значение...">
                <button id="addCustomValueBtn">ДОБАВИТЬ</button>
            </div>
            <div class="modal-buttons">
                <button class="modal-save" id="saveModalBtn">СОХРАНИТЬ</button>
                <button class="modal-cancel" id="cancelModalBtn">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <div class="validation-tooltip" id="validationTooltip" style="display:none;"></div>

    <script>
        const STORAGE_KEY = 'dayzTypesEditorData_v2';
        const DEFINITIONS_STORAGE_KEY = 'dayzTypesEditorDefinitions_v1';

        const state = {
            items: [],
            selectedItems: new Set(),
            currentSearchTerm: '',
            definitions: {
                categories: [],
                tags: [],
                usage: [],
                value: []
            },
            currentModal: {
                index: -1,
                field: '',
                inputElement: null,
                allOptions: []
            },
            searchTimer: null,
            rafId: null,
            ticking: false
        };

        const columns = [
            { id:'col0', title:'', type:'checkbox', width:40 },
            { id:'col1', title:'Имя', type:'name', field:'name', width:250 },
            { id:'col2', title:'nominal', type:'number', field:'nominal', width:80 },
            { id:'col3', title:'lifetime', type:'number', field:'lifetime', width:80 },
            { id:'col4', title:'restock', type:'number', field:'restock', width:80 },
            { id:'col5', title:'min', type:'number', field:'min', width:80 },
            { id:'col6', title:'quantmin', type:'number', field:'quantmin', width:80 },
            { id:'col7', title:'quantmax', type:'number', field:'quantmax', width:80 },
            { id:'col8', title:'cost', type:'number', field:'cost', width:80 },
            { id:'col9', title:'cargo', type:'flag', flag:'count_in_cargo', width:60 },
            { id:'col10', title:'hoarder', type:'flag', flag:'count_in_hoarder', width:64 },
            { id:'col11', title:'map', type:'flag', flag:'count_in_map', width:60 },
            { id:'col12', title:'player', type:'flag', flag:'count_in_player', width:60 },
            { id:'col13', title:'crafted', type:'flag', flag:'crafted', width:60 },
            { id:'col14', title:'deloot', type:'flag', flag:'deloot', width:60 },
            { id:'col15', title:'category', type:'text', field:'category', width:180 },
            { id:'col16', title:'usage', type:'text', field:'usage', width:180 },
            { id:'col17', title:'value', type:'text', field:'value', width:180 },
            { id:'col18', title:'tag', type:'text', field:'tag', width:180 }
        ];

        const $ = (selector) => document.querySelector(selector);
        const $$ = (selector) => Array.from(document.querySelectorAll(selector));

        const escapeHtml = (str) => String(str ?? '')
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
            .replace(/'/g,'&#39;');

        const escapeXmlAttr = (str) => String(str ?? '')
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
            .replace(/'/g,'&apos;');

        const uniqueArray = (arr) => [...new Set((arr || []).filter(Boolean))];

        const parseSpaceList = (text) => uniqueArray(
            String(text ?? '')
                .split(/\s+/)
                .map(v => v.trim())
                .filter(Boolean)
        );

        const arrayToSpaceList = (arr) => (arr && arr.length ? arr.join(' ') : '');

        const normalizeNumber = (value, fallback = 0) => {
            const parsed = Number.parseInt(value, 10);
            return Number.isNaN(parsed) ? fallback : parsed;
        };

        const getItemTemplate = () => ({
            id: crypto?.randomUUID ? crypto.randomUUID() : `item_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            name: generateUniqueName('NewItem'),
            nominal: 10,
            lifetime: 14400,
            restock: 0,
            min: 5,
            quantmin: -1,
            quantmax: -1,
            cost: 100,
            flags: {
                count_in_cargo: 0,
                count_in_hoarder: 0,
                count_in_map: 1,
                count_in_player: 0,
                crafted: 0,
                deloot: 0
            },
            category: [],
            usage: [],
            value: [],
            tag: []
        });

        function generateUniqueName(base) {
            const existing = new Set(state.items.map(item => String(item.name || '').trim()));
            if (!existing.has(base)) return base;
            let counter = 1;
            while (existing.has(`${base}_${counter}`)) counter++;
            return `${base}_${counter}`;
        }

        function getDuplicateNames() {
            const seen = new Map();
            const duplicates = new Set();

            state.items.forEach((item, index) => {
                const name = String(item?.name || '').trim().toLowerCase();
                if (!name) return;
                if (seen.has(name)) {
                    duplicates.add(index);
                    duplicates.add(seen.get(name));
                } else {
                    seen.set(name, index);
                }
            });

            return duplicates;
        }

        function validateItem(item, index) {
            const errors = [];
            const duplicateIndices = getDuplicateNames();

            const name = String(item?.name || '').trim();

            if (!name) errors.push('Имя пустое');
            if (duplicateIndices.has(index)) errors.push('Дублирующееся имя');

            if (item.nominal < 0) errors.push('nominal < 0');
            if (item.min < 0) errors.push('min < 0');
            if (item.nominal >= 0 && item.min >= 0 && item.nominal < item.min) {
                errors.push(`nominal (${item.nominal}) < min (${item.min})`);
            }
            if (item.lifetime < 0) errors.push('lifetime < 0');
            if (item.restock < 0) errors.push('restock < 0');
            if (item.cost < 0) errors.push('cost < 0');
            if (item.quantmin >= 0 && item.quantmax >= 0 && item.quantmin > item.quantmax) {
                errors.push(`quantmin (${item.quantmin}) > quantmax (${item.quantmax})`);
            }

            const flagNames = ['count_in_cargo','count_in_hoarder','count_in_map','count_in_player','crafted','deloot'];
            for (const flagName of flagNames) {
                const value = item.flags?.[flagName];
                if (![0, 1].includes(value)) {
                    errors.push(`Флаг ${flagName} должен быть 0 или 1`);
                }
            }

            return errors;
        }

        function showValidationTooltip(element, message) {
            const tooltip = $('#validationTooltip');
            if (!element || !tooltip) return;

            const rect = element.getBoundingClientRect();
            tooltip.textContent = message;
            tooltip.style.display = 'block';
            tooltip.style.left = `${rect.left}px`;
            tooltip.style.top = `${rect.bottom + 5}px`;

            window.clearTimeout(showValidationTooltip.timerId);
            showValidationTooltip.timerId = window.setTimeout(() => {
                tooltip.style.display = 'none';
            }, 3000);
        }

        function validateField(element, index, field) {
            const item = state.items[index];
            if (!item || !element) return;

            const errors = validateItem(item, index);
            const row = element.closest('tr');

            if (row) {
                row.classList.toggle('validation-error', errors.length > 0);
                row.title = errors.join('; ');
            }

            const fieldErrors = errors.filter(error => error.toLowerCase().includes(String(field).toLowerCase()) || (field === 'name' && error.toLowerCase().includes('имя')));

            element.classList.toggle('invalid', fieldErrors.length > 0 || (field === 'name' && !String(item.name || '').trim()));

            if (fieldErrors.length > 0) {
                showValidationTooltip(element, fieldErrors[0]);
            }
        }

        function saveStateToLocalStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items));
                localStorage.setItem(DEFINITIONS_STORAGE_KEY, JSON.stringify(state.definitions));
            } catch (error) {
                console.warn('Не удалось сохранить состояние:', error);
            }
        }

        function loadStateFromLocalStorage() {
            try {
                const rawItems = localStorage.getItem(STORAGE_KEY);
                const rawDefs = localStorage.getItem(DEFINITIONS_STORAGE_KEY);

                if (rawItems) {
                    const parsedItems = JSON.parse(rawItems);
                    if (Array.isArray(parsedItems)) {
                        state.items = parsedItems.map(item => ({
                            ...getItemTemplate(),
                            ...item,
                            id: item.id || (crypto?.randomUUID ? crypto.randomUUID() : `item_${Date.now()}_${Math.random().toString(16).slice(2)}`),
                            flags: {
                                count_in_cargo: 0,
                                count_in_hoarder: 0,
                                count_in_map: 1,
                                count_in_player: 0,
                                crafted: 0,
                                deloot: 0,
                                ...(item.flags || {})
                            },
                            category: uniqueArray(item.category || []),
                            usage: uniqueArray(item.usage || []),
                            value: uniqueArray(item.value || []),
                            tag: uniqueArray(item.tag || [])
                        }));
                    }
                }

                if (rawDefs) {
                    const parsedDefs = JSON.parse(rawDefs);
                    state.definitions = {
                        categories: uniqueArray(parsedDefs?.categories || []),
                        tags: uniqueArray(parsedDefs?.tags || []),
                        usage: uniqueArray(parsedDefs?.usage || []),
                        value: uniqueArray(parsedDefs?.value || [])
                    };
                }
            } catch (error) {
                console.warn('Не удалось восстановить состояние:', error);
            }
        }

        function renderHeader() {
            const thead = $('#tableHeaderRow');

            const html = `
                <tr>
                    ${columns.map(column => `
                        <th style="width:${column.width}px;">
                            ${column.type === 'checkbox'
                                ? '<input type="checkbox" id="selectAllCheckbox">'
                                : escapeHtml(column.title)}
                        </th>
                    `).join('')}
                </tr>
            `;

            thead.innerHTML = html;
        }

        function renderTable() {
            const tbody = $('#tableBodyRows');

            const html = state.items.map((item, index) => {
                const isVisible = !state.currentSearchTerm || itemMatchesSearch(item, state.currentSearchTerm);
                const isSelected = state.selectedItems.has(index);
                const errors = validateItem(item, index);

                return `
                    <tr
                        data-index="${index}"
                        class="${isSelected ? 'selected' : ''} ${!isVisible ? 'hidden-by-search' : ''} ${errors.length ? 'validation-error' : ''}"
                        title="${escapeHtml(errors.join('; '))}"
                    >
                        ${columns.map(column => renderCell(item, index, column, errors)).join('')}
                    </tr>
                `;
            }).join('');

            tbody.innerHTML = html;
            updateSelectAllCheckbox();
        }

        function renderCell(item, index, column, errors) {
            const widthStyle = `style="width:${column.width}px"`;

            if (column.type === 'checkbox') {
                return `
                    <td class="checkbox-cell" ${widthStyle}>
                        <input type="checkbox" class="item-checkbox" data-index="${index}" ${state.selectedItems.has(index) ? 'checked' : ''}>
                    </td>
                `;
            }

            if (column.type === 'name') {
                const invalid = !String(item.name || '').trim() || errors.some(e => e.toLowerCase().includes('имя'));
                return `
                    <td ${widthStyle}>
                        <input
                            type="text"
                            class="name-input ${invalid ? 'invalid' : ''}"
                            data-index="${index}"
                            data-field="name"
                            value="${escapeHtml(item.name)}"
                        >
                    </td>
                `;
            }

            if (column.type === 'number') {
                const fieldErrors = errors.some(e => e.toLowerCase().includes(column.field.toLowerCase()));
                return `
                    <td ${widthStyle}>
                        <input
                            type="number"
                            class="number-input ${fieldErrors ? 'invalid' : ''}"
                            data-index="${index}"
                            data-field="${column.field}"
                            value="${escapeHtml(item[column.field])}"
                        >
                    </td>
                `;
            }

            if (column.type === 'flag') {
                return `
                    <td class="flag-cell" ${widthStyle}>
                        <input
                            type="checkbox"
                            class="flag-checkbox"
                            data-index="${index}"
                            data-flag="${column.flag}"
                            ${item.flags?.[column.flag] ? 'checked' : ''}
                        >
                    </td>
                `;
            }

            if (column.type === 'text') {
                const value = arrayToSpaceList(item[column.field]);
                return `
                    <td ${widthStyle}>
                        <div class="field-with-button">
                            <input
                                type="text"
                                id="field-${index}-${column.field}"
                                class="text-input"
                                data-index="${index}"
                                data-field="${column.field}"
                                value="${escapeHtml(value)}"
                            >
                            <button type="button" class="open-modal-btn" data-index="${index}" data-field="${column.field}">▼</button>
                        </div>
                    </td>
                `;
            }

            return `<td ${widthStyle}></td>`;
        }

        function itemMatchesSearch(item, searchTerm) {
            if (!searchTerm) return true;

            const st = String(searchTerm || '').toLowerCase();

            if (String(item?.name || '').toLowerCase().includes(st)) return true;

            const numericFields = ['nominal','lifetime','restock','min','quantmin','quantmax','cost'];
            if (numericFields.some(field => String(item?.[field] ?? '').includes(st))) return true;

            const flagValues = Object.values(item?.flags || {});
            if (flagValues.some(value => String(value).includes(st))) return true;

            const textFields = ['category','usage','value','tag'];
            for (const field of textFields) {
                const arr = Array.isArray(item?.[field]) ? item[field] : [];
                if (arr.some(value => String(value).toLowerCase().includes(st))) return true;
            }

            return false;
        }

        function applySearchFilter() {
            $$('#tableBodyRows tr[data-index]').forEach(row => {
                const index = Number.parseInt(row.dataset.index, 10);
                const matched = itemMatchesSearch(state.items[index], state.currentSearchTerm);
                row.classList.toggle('hidden-by-search', !matched);
            });

            updateSelectAllCheckbox();
        }

        function updateClearButton() {
            $('#clearSearchBtn').disabled = !$('#searchInput').value;
        }

        function filterItemsDebounced() {
            window.clearTimeout(state.searchTimer);
            state.searchTimer = window.setTimeout(() => {
                state.currentSearchTerm = $('#searchInput').value.toLowerCase();
                applySearchFilter();
                updateClearButton();
            }, 120);
        }

        function clearSearch() {
            state.currentSearchTerm = '';
            $('#searchInput').value = '';
            applySearchFilter();
            updateClearButton();
        }

        function toggleItemSelection(index) {
            if (state.selectedItems.has(index)) {
                state.selectedItems.delete(index);
            } else {
                state.selectedItems.add(index);
            }

            const row = $(`#tableBodyRows tr[data-index="${index}"]`);
            if (row) {
                row.classList.toggle('selected', state.selectedItems.has(index));
                const checkbox = row.querySelector('.item-checkbox');
                if (checkbox) checkbox.checked = state.selectedItems.has(index);
            }

            updateSelectAllCheckbox();
        }

        function toggleSelectVisible() {
            const selectAll = $('#selectAllCheckbox');
            const visibleRows = $$('#tableBodyRows tr[data-index]:not(.hidden-by-search)');

            visibleRows.forEach(row => {
                const index = Number.parseInt(row.dataset.index, 10);

                if (selectAll.checked) {
                    state.selectedItems.add(index);
                    row.classList.add('selected');
                } else {
                    state.selectedItems.delete(index);
                    row.classList.remove('selected');
                }

                const checkbox = row.querySelector('.item-checkbox');
                if (checkbox) checkbox.checked = selectAll.checked;
            });

            updateSelectAllCheckbox();
        }

        function updateSelectAllCheckbox() {
            const checkbox = $('#selectAllCheckbox');
            if (!checkbox) return;

            const visibleRows = $$('#tableBodyRows tr[data-index]:not(.hidden-by-search)');
            if (!visibleRows.length) {
                checkbox.checked = false;
                checkbox.indeterminate = false;
                return;
            }

            let selectedVisibleCount = 0;
            for (const row of visibleRows) {
                const index = Number.parseInt(row.dataset.index, 10);
                if (state.selectedItems.has(index)) selectedVisibleCount++;
            }

            checkbox.checked = selectedVisibleCount === visibleRows.length;
            checkbox.indeterminate = selectedVisibleCount > 0 && selectedVisibleCount < visibleRows.length;
        }

        function updateItemField(index, field, value) {
            if (!state.items[index]) return;
            state.items[index][field] = value;
            saveStateToLocalStorage();
        }

        function updateNumberField(index, field, value) {
            if (!state.items[index]) return;

            const fallback = field.includes('quant') ? -1 : 0;
            state.items[index][field] = normalizeNumber(value, fallback);

            saveStateToLocalStorage();
            updateRowValidation(index);
        }

        function updateFlag(index, flag, checked) {
            if (!state.items[index]) return;
            state.items[index].flags[flag] = checked ? 1 : 0;
            saveStateToLocalStorage();
            updateRowValidation(index);
        }

        function updateTextField(index, field, value) {
            if (!state.items[index]) return;
            state.items[index][field] = parseSpaceList(value);
            saveStateToLocalStorage();

            if (state.currentSearchTerm) applySearchFilter();
        }

        function updateRowValidation(index) {
            const row = $(`#tableBodyRows tr[data-index="${index}"]`);
            const item = state.items[index];
            if (!row || !item) return;

            const errors = validateItem(item, index);
            row.classList.toggle('validation-error', errors.length > 0);
            row.title = errors.join('; ');

            const nameInput = row.querySelector('.name-input');
            if (nameInput) {
                nameInput.classList.toggle('invalid', !String(item.name || '').trim() || errors.some(e => e.toLowerCase().includes('имя')));
            }

            const numberInputs = row.querySelectorAll('.number-input');
            numberInputs.forEach(input => {
                const field = input.dataset.field;
                const invalid = errors.some(e => e.toLowerCase().includes(String(field).toLowerCase()));
                input.classList.toggle('invalid', invalid);
            });
        }

        function applyMassEdit() {
            if (!state.selectedItems.size) {
                alert('Выберите предметы');
                return;
            }

            const values = {
                nominal: $('#massNominal').value,
                lifetime: $('#massLifetime').value,
                restock: $('#massRestock').value,
                min: $('#massMin').value,
                quantmin: $('#massQuantmin').value,
                quantmax: $('#massQuantmax').value,
                cost: $('#massCost').value
            };

            const hasAnyValue = Object.values(values).some(value => value !== '');
            if (!hasAnyValue) {
                alert('Заполните хотя бы одно поле');
                return;
            }

            const indices = [...state.selectedItems];
            indices.forEach(index => {
                for (const [field, value] of Object.entries(values)) {
                    if (value === '') continue;
                    const fallback = field.includes('quant') ? -1 : 0;
                    state.items[index][field] = normalizeNumber(value, fallback);
                }
            });

            state.selectedItems.clear();
            saveStateToLocalStorage();
            renderTable();
            alert(`Применено к ${indices.length} предметам`);
        }

        function deleteSelected() {
            if (!state.selectedItems.size) {
                alert('Выберите предметы');
                return;
            }

            if (!confirm(`Удалить ${state.selectedItems.size} предметов?`)) return;

            const indices = [...state.selectedItems].sort((a, b) => b - a);
            indices.forEach(index => state.items.splice(index, 1));

            state.selectedItems.clear();
            saveStateToLocalStorage();
            renderTable();
        }

        function addItem() {
            state.items.push(getItemTemplate());
            saveStateToLocalStorage();
            renderTable();

            setTimeout(() => {
                const tableBody = $('#tableBody');
                tableBody.scrollTop = tableBody.scrollHeight;
            }, 50);
        }

        function clearAll() {
            if (!state.items.length) return;
            if (!confirm(`Очистить все ${state.items.length} предметов?`)) return;

            state.items = [];
            state.selectedItems.clear();
            state.currentSearchTerm = '';
            $('#searchInput').value = '';
            updateClearButton();
            saveStateToLocalStorage();
            renderTable();
        }

        function openModal(index, field) {
            const item = state.items[index];
            if (!item) return;

            let title = '';
            let options = [];

            switch (field) {
                case 'category':
                    title = 'ВЫБЕРИТЕ КАТЕГОРИИ';
                    options = state.definitions.categories || [];
                    break;
                case 'usage':
                    title = 'ВЫБЕРИТЕ USAGE';
                    options = state.definitions.usage || [];
                    break;
                case 'value':
                    title = 'ВЫБЕРИТЕ VALUE';
                    options = state.definitions.value || [];
                    break;
                case 'tag':
                    title = 'ВЫБЕРИТЕ ТЕГИ';
                    options = state.definitions.tags || [];
                    break;
                default:
                    return;
            }

            state.currentModal = {
                index,
                field,
                inputElement: $(`#field-${index}-${field}`),
                allOptions: uniqueArray(options)
            };

            $('#modalTitle').textContent = title;

            const currentValues = state.currentModal.inputElement
                ? parseSpaceList(state.currentModal.inputElement.value)
                : [];

            renderModalList(state.currentModal.allOptions, currentValues);
            updateSelectedValuesDisplay(currentValues);

            $('#modalCustomValue').value = '';
            $('#valueModal').classList.add('active');
        }

        function renderModalList(options, selected) {
            const list = $('#modalList');

            if (!options.length) {
                list.innerHTML = '<div class="modal-item" style="justify-content:center;color:#7a5c3a;">Загрузите файл определений</div>';
                return;
            }

            list.innerHTML = options.map(option => `
                <div class="modal-item">
                    <input type="checkbox" class="value-checkbox" value="${escapeHtml(option)}" ${selected.includes(option) ? 'checked' : ''}>
                    <span>${escapeHtml(option)}</span>
                </div>
            `).join('');
        }

        function getSelectedValuesFromCheckboxes() {
            return uniqueArray($$('.value-checkbox:checked').map(checkbox => checkbox.value));
        }

        function updateSelectedValuesDisplay(values) {
            const container = $('#selectedValuesList');

            if (!values.length) {
                container.innerHTML = '<span class="selected-value-placeholder">ничего не выбрано</span>';
                return;
            }

            container.innerHTML = values
                .map(value => `<span class="selected-value-tag">${escapeHtml(value)}</span>`)
                .join('');
        }

        function clearAllSelections() {
            $$('.value-checkbox').forEach(checkbox => {
                checkbox.checked = false;
            });
            updateSelectedValuesDisplay([]);
        }

        function addCustomValue() {
            const customInput = $('#modalCustomValue');
            const value = customInput.value.trim();

            if (!value) return;

            const existingCheckbox = $$('.value-checkbox').find(checkbox => checkbox.value === value);

            if (existingCheckbox) {
                existingCheckbox.checked = true;
            } else {
                state.currentModal.allOptions = uniqueArray([...state.currentModal.allOptions, value]);
                const currentSelected = getSelectedValuesFromCheckboxes();
                renderModalList(state.currentModal.allOptions, uniqueArray([...currentSelected, value]));
            }

            updateSelectedValuesDisplay(getSelectedValuesFromCheckboxes());
            customInput.value = '';
            customInput.focus();
        }

        function saveModalValues() {
            const selectedValues = uniqueArray(getSelectedValuesFromCheckboxes());

            if (state.currentModal.inputElement) {
                state.currentModal.inputElement.value = selectedValues.join(' ');
            }

            if (state.items[state.currentModal.index]) {
                state.items[state.currentModal.index][state.currentModal.field] = selectedValues;
            }

            saveStateToLocalStorage();

            if (state.currentSearchTerm) applySearchFilter();
            closeModal();
        }

        function closeModal() {
            $('#valueModal').classList.remove('active');
        }

        function downloadTextFile(content, filename, mimeType = 'text/plain') {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');

            anchor.href = url;
            anchor.download = filename;
            anchor.click();

            URL.revokeObjectURL(url);
        }

        function loadDefinitionsFromFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xml';

            input.addEventListener('change', event => {
                const [file] = event.target.files || [];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = loadEvent => {
                    try {
                        const xmlDoc = new DOMParser().parseFromString(loadEvent.target.result, 'text/xml');
                        if (xmlDoc.querySelector('parsererror')) {
                            throw new Error('Невалидный XML');
                        }

                        const categories = [...xmlDoc.getElementsByTagName('category')]
                            .map(node => node.getAttribute('name'))
                            .filter(Boolean);

                        const tags = [...xmlDoc.getElementsByTagName('tag')]
                            .map(node => node.getAttribute('name'))
                            .filter(Boolean);

                        const usage = [...xmlDoc.getElementsByTagName('usage')]
                            .map(node => node.getAttribute('name'))
                            .filter(Boolean);

                        const value = [...xmlDoc.getElementsByTagName('value')]
                            .map(node => node.getAttribute('name'))
                            .filter(Boolean);

                        state.definitions = {
                            categories: uniqueArray(categories),
                            tags: uniqueArray(tags),
                            usage: uniqueArray(usage),
                            value: uniqueArray(value)
                        };

                        saveStateToLocalStorage();

                        alert(`Загружено ${categories.length + tags.length + usage.length + value.length} определений`);
                    } catch (error) {
                        alert(`Ошибка: ${error.message}`);
                        console.error(error);
                    }
                };

                reader.readAsText(file);
            });

            input.click();
        }

        function exportXML() {
            if (!state.items.length) {
                alert('Нечего сохранять');
                return;
            }

            const totalErrors = state.items.reduce((sum, item, index) => sum + validateItem(item, index).length, 0);

            if (totalErrors > 0 && !confirm(`Обнаружено ${totalErrors} предупреждений валидации.\nВсё равно сохранить?`)) {
                return;
            }

            let xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<types>\n';

            state.items.forEach(item => {
                xml += `\t<type name="${escapeXmlAttr(item.name)}">\n`;
                xml += `\t\t<nominal>${item.nominal}</nominal>\n`;
                xml += `\t\t<lifetime>${item.lifetime}</lifetime>\n`;
                xml += `\t\t<restock>${item.restock}</restock>\n`;
                xml += `\t\t<min>${item.min}</min>\n`;
                xml += `\t\t<quantmin>${item.quantmin}</quantmin>\n`;
                xml += `\t\t<quantmax>${item.quantmax}</quantmax>\n`;
                xml += `\t\t<cost>${item.cost}</cost>\n`;
                xml += `\t\t<flags count_in_cargo="${item.flags.count_in_cargo}" count_in_hoarder="${item.flags.count_in_hoarder}" count_in_map="${item.flags.count_in_map}" count_in_player="${item.flags.count_in_player}" crafted="${item.flags.crafted}" deloot="${item.flags.deloot}" />\n`;

                uniqueArray(item.category).forEach(value => {
                    xml += `\t\t<category name="${escapeXmlAttr(value)}" />\n`;
                });

                uniqueArray(item.usage).forEach(value => {
                    xml += `\t\t<usage name="${escapeXmlAttr(value)}" />\n`;
                });

                uniqueArray(item.value).forEach(value => {
                    xml += `\t\t<value name="${escapeXmlAttr(value)}" />\n`;
                });

                uniqueArray(item.tag).forEach(value => {
                    xml += `\t\t<tag name="${escapeXmlAttr(value)}" />\n`;
                });

                xml += '\t</type>\n';
            });

            xml += '</types>';

            downloadTextFile(xml, 'types.xml', 'text/xml');
        }

        function importXML() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xml';

            input.addEventListener('change', event => {
                const [file] = event.target.files || [];
                if (!file) return;

                const reader = new FileReader();

                reader.onload = loadEvent => {
                    try {
                        const doc = new DOMParser().parseFromString(loadEvent.target.result, 'text/xml');
                        if (doc.querySelector('parsererror')) {
                            throw new Error('Невалидный XML файл');
                        }

                        const importedItems = [];
                        const types = [...doc.getElementsByTagName('type')];

                        for (const typeNode of types) {
                            const item = getItemTemplate();
                            item.name = typeNode.getAttribute('name') || generateUniqueName('Unknown');

                            const numberTags = ['nominal','lifetime','restock','min','quantmin','quantmax','cost'];
                            for (const tag of numberTags) {
                                const element = typeNode.getElementsByTagName(tag)[0];
                                if (!element) continue;

                                const fallback = tag.includes('quant') ? -1 : 0;
                                item[tag] = normalizeNumber(element.textContent, fallback);
                            }

                            const flagsNode = typeNode.getElementsByTagName('flags')[0];
                            if (flagsNode) {
                                const flagNames = ['count_in_cargo','count_in_hoarder','count_in_map','count_in_player','crafted','deloot'];
                                for (const flagName of flagNames) {
                                    const value = normalizeNumber(flagsNode.getAttribute(flagName) ?? '0', 0);
                                    item.flags[flagName] = value === 1 ? 1 : 0;
                                }
                            }

                            const textFields = ['category','usage','value','tag'];
                            for (const field of textFields) {
                                const nodes = [...typeNode.getElementsByTagName(field)];
                                item[field] = uniqueArray(
                                    nodes.map(node => node.getAttribute('name')).filter(Boolean)
                                );
                            }

                            importedItems.push(item);
                        }

                        state.items = importedItems;
                        state.selectedItems.clear();
                        state.currentSearchTerm = $('#searchInput').value.toLowerCase();
                        saveStateToLocalStorage();
                        renderTable();

                        alert(`Загружено ${state.items.length} предметов`);
                    } catch (error) {
                        alert(`Ошибка: ${error.message}`);
                        console.error(error);
                    }
                };

                reader.readAsText(file);
            });

            input.click();
        }

        function handleTableChange(event) {
            const target = event.target;

            if (target.id === 'selectAllCheckbox') {
                toggleSelectVisible();
                return;
            }

            if (target.classList.contains('item-checkbox')) {
                const index = Number.parseInt(target.dataset.index, 10);
                toggleItemSelection(index);
                return;
            }

            if (target.classList.contains('flag-checkbox')) {
                const index = Number.parseInt(target.dataset.index, 10);
                const flag = target.dataset.flag;
                updateFlag(index, flag, target.checked);
                return;
            }

            if (target.classList.contains('value-checkbox')) {
                updateSelectedValuesDisplay(getSelectedValuesFromCheckboxes());
            }
        }

        function handleTableInput(event) {
            const target = event.target;

            if (target.classList.contains('name-input')) {
                const index = Number.parseInt(target.dataset.index, 10);
                updateItemField(index, 'name', target.value);
                updateRowValidation(index);
                if (state.currentSearchTerm) applySearchFilter();
            }

            if (target.id === 'searchInput') {
                filterItemsDebounced();
            }
        }

        function handleTableBlur(event) {
            const target = event.target;

            if (target.classList.contains('name-input')) {
                const index = Number.parseInt(target.dataset.index, 10);
                validateField(target, index, 'name');
                saveStateToLocalStorage();
                return;
            }

            if (target.classList.contains('number-input')) {
                const index = Number.parseInt(target.dataset.index, 10);
                const field = target.dataset.field;
                updateNumberField(index, field, target.value);
                validateField(target, index, field);
                return;
            }

            if (target.classList.contains('text-input')) {
                const index = Number.parseInt(target.dataset.index, 10);
                const field = target.dataset.field;
                updateTextField(index, field, target.value);
            }
        }

        function handleDocumentClick(event) {
            const target = event.target;

            if (!target.closest('#validationTooltip')) {
                $('#validationTooltip').style.display = 'none';
            }

            if (target.id === 'clearSearchBtn') {
                clearSearch();
                return;
            }

            if (target.id === 'loadDefinitionsBtn') {
                loadDefinitionsFromFile();
                return;
            }

            if (target.id === 'applyMassEditBtn') {
                applyMassEdit();
                return;
            }

            if (target.id === 'deleteSelectedBtn') {
                deleteSelected();
                return;
            }

            if (target.id === 'addItemBtn') {
                addItem();
                return;
            }

            if (target.id === 'clearAllBtn') {
                clearAll();
                return;
            }

            if (target.id === 'exportBtn') {
                exportXML();
                return;
            }

            if (target.id === 'importBtn') {
                importXML();
                return;
            }

            if (target.classList.contains('open-modal-btn')) {
                const index = Number.parseInt(target.dataset.index, 10);
                const field = target.dataset.field;
                openModal(index, field);
                return;
            }

            if (target.id === 'modalCloseBtn' || target.id === 'cancelModalBtn') {
                closeModal();
                return;
            }

            if (target.id === 'clearAllSelectionsBtn') {
                clearAllSelections();
                return;
            }

            if (target.id === 'addCustomValueBtn') {
                addCustomValue();
                return;
            }

            if (target.id === 'saveModalBtn') {
                saveModalValues();
                return;
            }

            if (target.id === 'valueModal') {
                closeModal();
            }
        }

        function setupScrollSync() {
            const tableBody = $('#tableBody');
            const tableHeader = $('#tableHeader');

            if (!tableBody || !tableHeader) return;

            tableBody.addEventListener('scroll', () => {
                if (state.ticking) return;

                state.rafId = requestAnimationFrame(() => {
                    tableHeader.scrollLeft = tableBody.scrollLeft;
                    state.ticking = false;
                });

                state.ticking = true;
            });

            window.addEventListener('resize', () => {
                tableHeader.scrollLeft = tableBody.scrollLeft;
            });
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', event => {
                const modalActive = $('#valueModal').classList.contains('active');

                if (event.ctrlKey && event.key.toLowerCase() === 's') {
                    event.preventDefault();
                    exportXML();
                    return;
                }

                if (event.key === 'Escape' && modalActive) {
                    closeModal();
                    return;
                }

                if (event.key === 'Enter' && modalActive) {
                    if (event.target.id === 'modalCustomValue') {
                        event.preventDefault();
                        addCustomValue();
                        return;
                    }

                    if (event.target.tagName !== 'BUTTON') {
                        event.preventDefault();
                        saveModalValues();
                        return;
                    }
                }

                if (
                    event.key === 'Delete' &&
                    !event.target.matches('input,textarea,select') &&
                    state.selectedItems.size > 0
                ) {
                    deleteSelected();
                }
            });
        }

        function bindEvents() {
            document.addEventListener('click', handleDocumentClick);
            document.addEventListener('input', handleTableInput);
            document.addEventListener('change', handleTableChange);
            document.addEventListener('focusout', handleTableBlur);

            $('#modalCustomValue').addEventListener('input', () => {
                // резерв под будущую логику, оставлено намеренно
            });
        }

        function init() {
            loadStateFromLocalStorage();
            renderHeader();
            renderTable();
            setupScrollSync();
            setupKeyboardShortcuts();
            bindEvents();
            updateClearButton();

            if ($('#searchInput').value) {
                state.currentSearchTerm = $('#searchInput').value.toLowerCase();
                applySearchFilter();
            }
        }

        window.addEventListener('load', init);

        window.addEventListener('beforeunload', () => {
            if (state.rafId) cancelAnimationFrame(state.rafId);
            saveStateToLocalStorage();
        });
    </script>
</body>
</html>

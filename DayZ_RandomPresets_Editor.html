<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayZ RandomPresets Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        :root {
            --bg-main: #0a0f14;
            --panel-dark: #1e2b1e;
            --panel-dark-2: #1a251a;
            --panel-soft: #2a3a2a;
            --accent: #c49a6c;
            --accent-dark: #7a5c3a;
            --accent-muted: #b4a68a;
            --border: #5a4a3a;
            --text-main: #d4c8b0;
            --text-dim: #7a5c3a;
            --green: #27ae60;
            --orange: #e67e22;
            --blue: #3498db;
            --red: #e74c3c;
            --shadow: rgba(0,0,0,0.8);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(
                    45deg,
                    rgba(101, 67, 33, 0.1) 0px,
                    rgba(101, 67, 33, 0.1) 2px,
                    rgba(70, 40, 20, 0.1) 2px,
                    rgba(70, 40, 20, 0.1) 4px
                ),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 L90 10 M10 20 L90 20 M10 30 L90 30 M10 40 L90 40 M10 50 L90 50 M10 60 L90 60 M10 70 L90 70 M10 80 L90 80 M10 90 L90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/><path d="M10 10 L10 90 M20 10 L20 90 M30 10 L30 90 M40 10 L40 90 M50 10 L50 90 M60 10 L60 90 M70 10 L70 90 M80 10 L80 90 M90 10 L90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/></svg>');
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(5px);
            border: 2px solid #7a5c3a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(101, 67, 33, 0.3);
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -2px;
            border: 2px solid rgba(170, 110, 40, 0.3);
            border-radius: 10px;
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .container::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px dashed rgba(170, 110, 40, 0.2);
            border-radius: 4px;
            pointer-events: none;
        }

        .header {
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            color: #c49a6c;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.2), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, transparent 50%, #7a5c3a 50%);
            opacity: 0.3;
        }

        .header h2 {
            font-size: 1.5em;
            font-weight: 600;
            color: #c49a6c;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #3d2b1a;
            font-family: 'Segoe UI', monospace;
        }

        .main-content {
            display: flex;
            gap: 20px;
            min-height: 75vh;
        }

        .sidebar {
            width: 320px;
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            padding: 15px;
            border-radius: 5px;
            flex-shrink: 0;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .sidebar::before,
        .editor::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path d="M1 3 L1 4 M2 2 L2 3 M3 1 L3 2 M0 0 L0 1" stroke="%23aa6e40" stroke-width="0.5" opacity="0.1"/></svg>');
            pointer-events: none;
        }

        .editor {
            flex: 1;
            min-width: 0;
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            border-radius: 5px;
            border: 2px solid #5a4a3a;
            padding: 15px;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1), 0 5px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .sidebar h3,
        .editor h3 {
            color: #c49a6c;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #5a4a3a;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 #3d2b1a;
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #b4a68a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #5a4a3a;
            border-radius: 3px;
            font-size: 13px;
            background: #0f1a0f;
            color: #d4c8b0;
            font-family: 'Segoe UI', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"],
        input[type="number"],
        select {
            height: 32px;
        }

        textarea {
            min-height: 70px;
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #c49a6c;
            box-shadow: 0 0 0 2px rgba(196,154,108,0.2);
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }

        .uniform-btn {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            border: 2px solid #5a4a3a;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            background: #1e2b1e;
            color: #c49a6c;
            box-shadow: 0 3px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
            position: relative;
            overflow: hidden;
        }

        .uniform-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196,154,108,0.2), transparent);
            transition: left 0.3s;
        }

        .uniform-btn:hover::before {
            left: 100%;
        }

        .uniform-btn:hover {
            transform: translateY(-2px);
        }

        .uniform-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
        }

        .primary { background: #1e3a1e; border-color: #2a6b2a; }
        .primary:hover { border-color: #27ae60; }

        .secondary { background: #3a2a1e; border-color: #8b5a2a; }
        .secondary:hover { border-color: #e67e22; }

        .export { background: #1e2a3a; border-color: #2a4a6b; }
        .export:hover { border-color: #3498db; }

        .danger { background: #3a1e1e; border-color: #8b2a2a; }
        .danger:hover { border-color: #e74c3c; }

        .neutral { background: #2a2a2a; border-color: #5a5a5a; }
        .neutral:hover { border-color: #7f8c8d; }

        .search-box {
            margin-bottom: 15px;
        }

        .preset-list {
            max-height: calc(100vh - 360px);
            overflow-y: auto;
            border: 2px solid #5a4a3a;
            border-radius: 3px;
            background: #0f1a0f;
            padding: 8px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .preset-item {
            background: #1e2b1e;
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-item:hover {
            border-color: #c49a6c;
            background: #2a3a2a;
        }

        .preset-item.active {
            border-color: #c49a6c;
            background: #3d2b1a;
        }

        .preset-item.hidden {
            display: none;
        }

        .preset-item strong {
            display: block;
            color: #c49a6c;
            font-size: 13px;
            margin-bottom: 4px;
            font-family: 'Segoe UI', monospace;
        }

        .preset-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #b4a68a;
        }

        .meta-badge {
            background: #0f1a0f;
            border: 1px solid #5a4a3a;
            border-radius: 3px;
            padding: 2px 6px;
        }

        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            border-bottom: 2px solid #5a4a3a;
            padding-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .tab-btn {
            padding: 8px 12px;
            background: #1e2b1e;
            border: 2px solid #5a4a3a;
            cursor: pointer;
            font-size: 13px;
            color: #b4a68a;
            border-radius: 3px;
            transition: all 0.2s;
            height: 36px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            font-weight: 600;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .tab-btn:hover {
            background: #2a3a2a;
            border-color: #7a5c3a;
            color: #d4c8b0;
        }

        .tab-btn.active {
            background: #2a3a2a;
            border-color: #c49a6c;
            color: #c49a6c;
            box-shadow: 0 0 10px rgba(196,154,108,0.3);
        }

        .tab-pane {
            display: none;
            position: relative;
            z-index: 1;
            min-height: 0;
            flex: 1;
        }

        .tab-pane.active {
            display: block;
        }

        .editor-scroll {
            max-height: calc(100vh - 260px);
            overflow-y: auto;
            padding-right: 5px;
        }

        .preset-card,
        .item-card {
            background: #1e2b1e;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #5a4a3a;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,215,140,0.1);
            position: relative;
        }

        .item-card h5,
        .preset-card h4 {
            color: #c49a6c;
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #3d2b1a;
        }

        .inline-row {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 10px;
        }

        .inline-row-3 {
            display: grid;
            grid-template-columns: 1fr 140px 140px;
            gap: 10px;
        }

        .xml-output {
            background: #0f1a0f;
            color: #d4c8b0;
            padding: 15px;
            border-radius: 3px;
            font-family: 'Segoe UI', monospace;
            white-space: pre-wrap;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.45;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }

        .empty-state {
            color: #7a5c3a;
            text-align: center;
            padding: 30px 15px;
            border: 2px dashed #5a4a3a;
            border-radius: 4px;
            background: #0f1a0f;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: #1e2b1e;
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            padding: 12px;
        }

        .stat-card strong {
            display: block;
            color: #c49a6c;
            margin-bottom: 5px;
            font-family: 'Segoe UI', monospace;
        }

        .stat-card span {
            color: #d4c8b0;
            font-size: 12px;
        }

        @media (max-width: 1100px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .preset-list {
                max-height: 300px;
            }
        }

        @media (max-width: 700px) {
            .inline-row,
            .inline-row-3 {
                grid-template-columns: 1fr;
            }

            .tab-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>RANDOMPRESETS EDITOR</h2>
        </div>

        <div class="main-content">
            <aside class="sidebar">
                <h3>Пресеты</h3>

                <div class="form-group search-box">
                    <label>Поиск</label>
                    <input type="text" id="searchInput" placeholder="Имя пресета или item...">
                </div>

                <div class="btn-group">
                    <button class="uniform-btn primary" id="addCargoBtn">+ Cargo</button>
                    <button class="uniform-btn secondary" id="addAttachmentsBtn">+ Attach</button>
                </div>

                <div class="btn-group">
                    <button class="uniform-btn neutral" id="newFileBtn">Новый</button>
                    <button class="uniform-btn danger" id="clearAllBtn">Очистить</button>
                </div>

                <div class="btn-group">
                    <button class="uniform-btn export" id="importBtn">Загрузить XML</button>
                    <button class="uniform-btn export" id="exportBtn">Сохранить XML</button>
                </div>

                <div class="preset-list" id="presetList"></div>
            </aside>

            <main class="editor">
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="editor">Редактор</button>
                    <button class="tab-btn" data-tab="preview">Preview XML</button>
                    <button class="tab-btn" data-tab="stats">Статистика</button>
                </div>

                <div id="editorTab" class="tab-pane active">
                    <div class="editor-scroll" id="editorContent"></div>
                </div>

                <div id="previewTab" class="tab-pane">
                    <div class="xml-output" id="xmlOutput"></div>
                </div>

                <div id="statsTab" class="tab-pane">
                    <div class="stats-grid" id="statsGrid"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'dayzRandomPresetsEditor_v1';

        const state = {
            presets: [],
            selectedIndex: -1,
            currentTab: 'editor',
            searchTerm: ''
        };

        const $ = (selector) => document.querySelector(selector);
        const $$ = (selector) => Array.from(document.querySelectorAll(selector));

        const escapeHtml = (str) => String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const escapeXmlAttr = (str) => String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');

        const normalizeChance = (value, fallback = '0.00') => {
            const str = String(value ?? '').trim();
            if (!str) return fallback;
            const num = Number.parseFloat(str);
            if (Number.isNaN(num)) return fallback;
            return num.toFixed(3).replace(/0+$/,'').replace(/\.$/,'');
        };

        const createPreset = (type = 'cargo') => ({
            type,
            name: `${type}_preset_${state.presets.length + 1}`,
            chance: '0.10',
            items: [
                { name: 'ExampleItem', chance: '0.10' }
            ]
        });

        const saveState = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                presets: state.presets,
                selectedIndex: state.selectedIndex
            }));
        };

        const loadState = () => {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                state.presets = Array.isArray(parsed.presets) ? parsed.presets : [];
                state.selectedIndex = typeof parsed.selectedIndex === 'number' ? parsed.selectedIndex : -1;
                if (state.selectedIndex >= state.presets.length) state.selectedIndex = state.presets.length - 1;
            } catch (e) {
                console.warn('Не удалось загрузить randompresets state', e);
            }
        };

        const renderPresetList = () => {
            const list = $('#presetList');

            if (!state.presets.length) {
                list.innerHTML = `<div class="empty-state">Нет пресетов</div>`;
                return;
            }

            list.innerHTML = state.presets.map((preset, index) => {
                const itemsText = (preset.items || []).map(item => item.name).join(' ').toLowerCase();
                const matches = !state.searchTerm
                    || String(preset.name).toLowerCase().includes(state.searchTerm)
                    || itemsText.includes(state.searchTerm);

                return `
                    <div class="preset-item ${index === state.selectedIndex ? 'active' : ''} ${matches ? '' : 'hidden'}" data-index="${index}">
                        <strong>${escapeHtml(preset.name || 'Без имени')}</strong>
                        <div class="preset-meta">
                            <span class="meta-badge">${escapeHtml(preset.type)}</span>
                            <span class="meta-badge">chance: ${escapeHtml(preset.chance)}</span>
                            <span class="meta-badge">items: ${(preset.items || []).length}</span>
                        </div>
                    </div>
                `;
            }).join('');
        };

        const renderEditor = () => {
            const container = $('#editorContent');

            if (state.selectedIndex < 0 || !state.presets[state.selectedIndex]) {
                container.innerHTML = `<div class="empty-state">Выберите пресет слева или создайте новый</div>`;
                return;
            }

            const preset = state.presets[state.selectedIndex];

            container.innerHTML = `
                <div class="preset-card">
                    <h4>
                        Параметры пресета
                        <button class="uniform-btn danger" id="deletePresetBtn" style="max-width:140px;">Удалить пресет</button>
                    </h4>

                    <div class="inline-row-3">
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" id="presetName" value="${escapeHtml(preset.name)}">
                        </div>
                        <div class="form-group">
                            <label>Тип</label>
                            <select id="presetType">
                                <option value="cargo" ${preset.type === 'cargo' ? 'selected' : ''}>cargo</option>
                                <option value="attachments" ${preset.type === 'attachments' ? 'selected' : ''}>attachments</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Chance</label>
                            <input type="text" id="presetChance" value="${escapeHtml(preset.chance)}">
                        </div>
                    </div>

                    <div class="btn-group">
                        <button class="uniform-btn secondary" id="clonePresetBtn">Клонировать</button>
                        <button class="uniform-btn primary" id="addItemBtn">+ Добавить item</button>
                    </div>
                </div>

                ${(preset.items || []).map((item, itemIndex) => `
                    <div class="item-card">
                        <h5>
                            Item #${itemIndex + 1}
                            <button class="uniform-btn danger remove-item-btn" data-item-index="${itemIndex}" style="max-width:120px;">Удалить</button>
                        </h5>
                        <div class="inline-row">
                            <div class="form-group">
                                <label>Item name</label>
                                <input type="text" class="item-name-input" data-item-index="${itemIndex}" value="${escapeHtml(item.name)}">
                            </div>
                            <div class="form-group">
                                <label>Chance</label>
                                <input type="text" class="item-chance-input" data-item-index="${itemIndex}" value="${escapeHtml(item.chance)}">
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;

            bindEditorEvents();
        };

        const renderXmlPreview = () => {
            $('#xmlOutput').textContent = generateXml();
        };

        const renderStats = () => {
            const totalPresets = state.presets.length;
            const cargoCount = state.presets.filter(p => p.type === 'cargo').length;
            const attachmentsCount = state.presets.filter(p => p.type === 'attachments').length;
            const totalItems = state.presets.reduce((sum, p) => sum + (p.items?.length || 0), 0);

            $('#statsGrid').innerHTML = `
                <div class="stat-card">
                    <strong>${totalPresets}</strong>
                    <span>Всего пресетов</span>
                </div>
                <div class="stat-card">
                    <strong>${cargoCount}</strong>
                    <span>Cargo пресетов</span>
                </div>
                <div class="stat-card">
                    <strong>${attachmentsCount}</strong>
                    <span>Attachments пресетов</span>
                </div>
                <div class="stat-card">
                    <strong>${totalItems}</strong>
                    <span>Всего items</span>
                </div>
            `;
        };

        const renderAll = () => {
            renderPresetList();
            renderEditor();
            renderXmlPreview();
            renderStats();
            saveState();
        };

        const bindEditorEvents = () => {
            const preset = state.presets[state.selectedIndex];
            if (!preset) return;

            $('#presetName')?.addEventListener('input', (e) => {
                preset.name = e.target.value;
                renderAll();
            });

            $('#presetType')?.addEventListener('change', (e) => {
                preset.type = e.target.value;
                renderAll();
            });

            $('#presetChance')?.addEventListener('input', (e) => {
                preset.chance = e.target.value;
                renderAll();
            });

            $('#deletePresetBtn')?.addEventListener('click', () => {
                state.presets.splice(state.selectedIndex, 1);
                if (state.selectedIndex >= state.presets.length) {
                    state.selectedIndex = state.presets.length - 1;
                }
                renderAll();
            });

            $('#clonePresetBtn')?.addEventListener('click', () => {
                const cloned = JSON.parse(JSON.stringify(preset));
                cloned.name = `${cloned.name}_copy`;
                state.presets.splice(state.selectedIndex + 1, 0, cloned);
                state.selectedIndex = state.selectedIndex + 1;
                renderAll();
            });

            $('#addItemBtn')?.addEventListener('click', () => {
                preset.items.push({ name: 'NewItem', chance: '0.10' });
                renderAll();
            });

            $$('.remove-item-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const itemIndex = Number.parseInt(btn.dataset.itemIndex, 10);
                    preset.items.splice(itemIndex, 1);
                    renderAll();
                });
            });

            $$('.item-name-input').forEach(input => {
                input.addEventListener('input', () => {
                    const itemIndex = Number.parseInt(input.dataset.itemIndex, 10);
                    preset.items[itemIndex].name = input.value;
                    renderAll();
                });
            });

            $$('.item-chance-input').forEach(input => {
                input.addEventListener('input', () => {
                    const itemIndex = Number.parseInt(input.dataset.itemIndex, 10);
                    preset.items[itemIndex].chance = input.value;
                    renderAll();
                });
            });
        };

        const generateXml = () => {
            let xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes" ?>\n<randompresets>\n`;

            state.presets.forEach(preset => {
                xml += `\t<${preset.type} chance="${escapeXmlAttr(normalizeChance(preset.chance, '0.10'))}" name="${escapeXmlAttr(preset.name || 'UnnamedPreset')}">\n`;

                (preset.items || []).forEach(item => {
                    xml += `\t\t<item name="${escapeXmlAttr(item.name || 'UnnamedItem')}" chance="${escapeXmlAttr(normalizeChance(item.chance, '0.10'))}" />\n`;
                });

                xml += `\t</${preset.type}>\n`;
            });

            xml += `</randompresets>`;
            return xml;
        };

        const downloadXml = () => {
            const xml = generateXml();
            const blob = new Blob([xml], { type: 'text/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'randompresets.xml';
            a.click();
            URL.revokeObjectURL(url);
        };

        const importXml = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xml';

            input.addEventListener('change', (event) => {
                const file = event.target.files?.[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const xmlText = e.target.result;
                        const doc = new DOMParser().parseFromString(xmlText, 'text/xml');

                        if (doc.querySelector('parsererror')) {
                            throw new Error('Невалидный XML');
                        }

                        const presets = [];
                        const nodes = [...doc.documentElement.children];

                        nodes.forEach(node => {
                            if (node.tagName !== 'cargo' && node.tagName !== 'attachments') return;

                            const preset = {
                                type: node.tagName,
                                name: node.getAttribute('name') || '',
                                chance: node.getAttribute('chance') || '0.10',
                                items: []
                            };

                            [...node.children].forEach(itemNode => {
                                if (itemNode.tagName !== 'item') return;
                                preset.items.push({
                                    name: itemNode.getAttribute('name') || '',
                                    chance: itemNode.getAttribute('chance') || '0.10'
                                });
                            });

                            presets.push(preset);
                        });

                        state.presets = presets;
                        state.selectedIndex = presets.length ? 0 : -1;
                        renderAll();
                        alert(`Загружено пресетов: ${presets.length}`);
                    } catch (error) {
                        alert(`Ошибка импорта: ${error.message}`);
                    }
                };

                reader.readAsText(file);
            });

            input.click();
        };

        const setTab = (tabName) => {
            state.currentTab = tabName;
            $$('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });
            $('#editorTab').classList.toggle('active', tabName === 'editor');
            $('#previewTab').classList.toggle('active', tabName === 'preview');
            $('#statsTab').classList.toggle('active', tabName === 'stats');
            if (tabName === 'preview') renderXmlPreview();
            if (tabName === 'stats') renderStats();
        };

        const setupEvents = () => {
            $('#addCargoBtn').addEventListener('click', () => {
                state.presets.push(createPreset('cargo'));
                state.selectedIndex = state.presets.length - 1;
                renderAll();
            });

            $('#addAttachmentsBtn').addEventListener('click', () => {
                state.presets.push(createPreset('attachments'));
                state.selectedIndex = state.presets.length - 1;
                renderAll();
            });

            $('#newFileBtn').addEventListener('click', () => {
                state.presets = [];
                state.selectedIndex = -1;
                renderAll();
            });

            $('#clearAllBtn').addEventListener('click', () => {
                if (!confirm('Очистить все пресеты?')) return;
                state.presets = [];
                state.selectedIndex = -1;
                renderAll();
            });

            $('#importBtn').addEventListener('click', importXml);
            $('#exportBtn').addEventListener('click', downloadXml);

            $('#searchInput').addEventListener('input', (e) => {
                state.searchTerm = e.target.value.trim().toLowerCase();
                renderPresetList();
            });

            document.addEventListener('click', (e) => {
                const presetItem = e.target.closest('.preset-item');
                if (presetItem && presetItem.dataset.index !== undefined) {
                    state.selectedIndex = Number.parseInt(presetItem.dataset.index, 10);
                    renderAll();
                }

                const tabBtn = e.target.closest('.tab-btn');
                if (tabBtn) {
                    setTab(tabBtn.dataset.tab);
                }
            });
        };

        window.addEventListener('load', () => {
            loadState();
            setupEvents();
            renderAll();
        });
    </script>
</body>
</html>

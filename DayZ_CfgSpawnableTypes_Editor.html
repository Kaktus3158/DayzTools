<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayZ CfgSpawnableTypes Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        :root {
            --bg-main: #0a0f14;
            --panel-dark: #1e2b1e;
            --panel-dark-2: #1a251a;
            --panel-soft: #2a3a2a;
            --accent: #c49a6c;
            --accent-dark: #7a5c3a;
            --accent-muted: #b4a68a;
            --border: #5a4a3a;
            --text-main: #d4c8b0;
            --text-dim: #7a5c3a;
            --green: #27ae60;
            --orange: #e67e22;
            --blue: #3498db;
            --red: #e74c3c;
            --purple: #9b59b6;
            --shadow: rgba(0,0,0,0.8);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(
                    45deg,
                    rgba(101, 67, 33, 0.1) 0px,
                    rgba(101, 67, 33, 0.1) 2px,
                    rgba(70, 40, 20, 0.1) 2px,
                    rgba(70, 40, 20, 0.1) 4px
                ),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 L90 10 M10 20 L90 20 M10 30 L90 30 M10 40 L90 40 M10 50 L90 50 M10 60 L90 60 M10 70 L90 70 M10 80 L90 80 M10 90 L90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/><path d="M10 10 L10 90 M20 10 L20 90 M30 10 L30 90 M40 10 L40 90 M50 10 L50 90 M60 10 L60 90 M70 10 L70 90 M80 10 L80 90 M90 10 L90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/></svg>');
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(5px);
            border: 2px solid #7a5c3a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(101, 67, 33, 0.3);
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -2px;
            border: 2px solid rgba(170, 110, 40, 0.3);
            border-radius: 10px;
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .container::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px dashed rgba(170, 110, 40, 0.2);
            border-radius: 4px;
            pointer-events: none;
        }

        .header {
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            color: #c49a6c;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.2), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, transparent 50%, #7a5c3a 50%);
            opacity: 0.3;
        }

        .header h2 {
            font-size: 1.5em;
            font-weight: 600;
            color: #c49a6c;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #3d2b1a;
            font-family: 'Segoe UI', monospace;
        }

        .header-badge {
            background: #1e2a3a;
            border: 1px solid #2a4a6b;
            color: #c49a6c;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
        }

        .main-content {
            display: flex;
            gap: 20px;
            min-height: 78vh;
        }

        .sidebar {
            width: 360px;
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            padding: 15px;
            border-radius: 5px;
            flex-shrink: 0;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .sidebar::before,
        .editor::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path d="M1 3 L1 4 M2 2 L2 3 M3 1 L3 2 M0 0 L0 1" stroke="%23aa6e40" stroke-width="0.5" opacity="0.1"/></svg>');
            pointer-events: none;
        }

        .editor {
            flex: 1;
            min-width: 0;
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            border-radius: 5px;
            border: 2px solid #5a4a3a;
            padding: 15px;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1), 0 5px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .sidebar h3,
        .editor h3 {
            color: #c49a6c;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #5a4a3a;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 #3d2b1a;
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #b4a68a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #5a4a3a;
            border-radius: 3px;
            font-size: 13px;
            background: #0f1a0f;
            color: #d4c8b0;
            font-family: 'Segoe UI', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"],
        input[type="number"],
        select {
            height: 32px;
        }

        textarea {
            min-height: 70px;
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #c49a6c;
            box-shadow: 0 0 0 2px rgba(196,154,108,0.2);
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #c49a6c;
        }

        input.invalid,
        select.invalid,
        textarea.invalid {
            border-color: #e74c3c !important;
            box-shadow: 0 0 0 2px rgba(231,76,60,0.18) !important;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }

        .uniform-btn {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            border: 2px solid #5a4a3a;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            background: #1e2b1e;
            color: #c49a6c;
            box-shadow: 0 3px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
            position: relative;
            overflow: hidden;
        }

        .uniform-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196,154,108,0.2), transparent);
            transition: left 0.3s;
        }

        .uniform-btn:hover::before { left: 100%; }
        .uniform-btn:hover { transform: translateY(-2px); }
        .uniform-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
        }

        .primary { background: #1e3a1e; border-color: #2a6b2a; }
        .primary:hover { border-color: #27ae60; }

        .secondary { background: #3a2a1e; border-color: #8b5a2a; }
        .secondary:hover { border-color: #e67e22; }

        .export { background: #1e2a3a; border-color: #2a4a6b; }
        .export:hover { border-color: #3498db; }

        .danger { background: #3a1e1e; border-color: #8b2a2a; }
        .danger:hover { border-color: #e74c3c; }

        .neutral { background: #2a2a2a; border-color: #5a5a5a; }
        .neutral:hover { border-color: #7f8c8d; }

        .move-up-btn,
        .move-down-btn {
            flex: 0 0 auto;
            min-width: 40px;
            width: 40px;
            padding: 0;
        }

        .search-box {
            margin-bottom: 15px;
        }

        .type-list {
            max-height: calc(100vh - 360px);
            overflow-y: auto;
            border: 2px solid #5a4a3a;
            border-radius: 3px;
            background: #0f1a0f;
            padding: 8px;
            position: relative;
            z-index: 1;
        }

        .type-item {
            background: #1e2b1e;
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-item:hover {
            border-color: #c49a6c;
            background: #2a3a2a;
        }

        .type-item.active {
            border-color: #c49a6c;
            background: #3d2b1a;
        }

        .type-item.invalid {
            border-color: #e74c3c;
        }

        .type-item.hidden {
            display: none;
        }

        .type-item strong {
            display: block;
            color: #c49a6c;
            font-size: 13px;
            margin-bottom: 4px;
            font-family: 'Segoe UI', monospace;
        }

        .type-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #b4a68a;
        }

        .meta-badge {
            background: #0f1a0f;
            border: 1px solid #5a4a3a;
            border-radius: 3px;
            padding: 2px 6px;
        }

        .meta-badge.ok {
            border-color: var(--green);
            color: var(--green);
        }

        .meta-badge.warn {
            border-color: var(--red);
            color: var(--red);
        }

        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            border-bottom: 2px solid #5a4a3a;
            padding-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .tab-btn {
            padding: 8px 12px;
            background: #1e2b1e;
            border: 2px solid #5a4a3a;
            cursor: pointer;
            font-size: 13px;
            color: #b4a68a;
            border-radius: 3px;
            transition: all 0.2s;
            height: 36px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            font-weight: 600;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .tab-btn:hover {
            background: #2a3a2a;
            border-color: #7a5c3a;
            color: #d4c8b0;
        }

        .tab-btn.active {
            background: #2a3a2a;
            border-color: #c49a6c;
            color: #c49a6c;
            box-shadow: 0 0 10px rgba(196,154,108,0.3);
        }

        .tab-pane {
            display: none;
            min-height: 0;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .tab-pane.active {
            display: block;
        }

        .editor-scroll {
            max-height: calc(100vh - 260px);
            overflow-y: auto;
            padding-right: 5px;
        }

        .block-card,
        .entry-card,
        .subitem-card {
            background: #1e2b1e;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #5a4a3a;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,215,140,0.1);
            position: relative;
        }

        .block-card.invalid,
        .entry-card.invalid,
        .subitem-card.invalid {
            border-color: #e74c3c;
        }

        .block-card h4,
        .entry-card h5,
        .subitem-card h6 {
            color: #c49a6c;
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #3d2b1a;
            gap: 10px;
            flex-wrap: wrap;
        }

        .subitem-card h6 {
            font-size: 12px;
        }

        .inline-row {
            display: grid;
            grid-template-columns: 1fr 140px;
            gap: 10px;
        }

        .inline-row-3 {
            display: grid;
            grid-template-columns: 1fr 150px 150px;
            gap: 10px;
        }

        .inline-row-4 {
            display: grid;
            grid-template-columns: 1fr 140px 140px 140px;
            gap: 10px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .checkbox-row label {
            margin-bottom: 0;
        }

        .section-mini-title {
            color: #b4a68a;
            margin: 18px 0 10px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #5a4a3a;
            padding-bottom: 6px;
        }

        .validation-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #5a4a3a;
            background: #0f1a0f;
            font-family: 'Segoe UI', monospace;
        }

        .validation-badge.valid {
            color: var(--green);
            border-color: var(--green);
        }

        .validation-badge.invalid {
            color: var(--red);
            border-color: var(--red);
        }

        .xml-output {
            background: #0f1a0f;
            color: #d4c8b0;
            padding: 15px;
            border-radius: 3px;
            font-family: 'Segoe UI', monospace;
            white-space: pre-wrap;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.45;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: #1e2b1e;
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            padding: 12px;
        }

        .stat-card strong {
            display: block;
            color: #c49a6c;
            margin-bottom: 5px;
            font-family: 'Segoe UI', monospace;
        }

        .stat-card span {
            color: #d4c8b0;
            font-size: 12px;
        }

        .empty-state {
            color: #7a5c3a;
            text-align: center;
            padding: 30px 15px;
            border: 2px dashed #5a4a3a;
            border-radius: 4px;
            background: #0f1a0f;
        }

        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .type-list {
                max-height: 320px;
            }
        }

        @media (max-width: 800px) {
            .inline-row,
            .inline-row-3,
            .inline-row-4 {
                grid-template-columns: 1fr;
            }

            .tab-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>CFGSPAWNABLETYPES EDITOR</h2>
        <div class="header-badge">V1.1</div>
    </div>

    <div class="main-content">
        <aside class="sidebar">
            <h3>Типы</h3>

            <div class="form-group search-box">
                <label>Поиск</label>
                <input type="text" id="searchInput" placeholder="Имя type, preset, item...">
            </div>

            <div class="btn-group">
                <button class="uniform-btn primary" id="addTypeBtn">+ Type</button>
                <button class="uniform-btn neutral" id="newFileBtn">Новый</button>
            </div>

            <div class="btn-group">
                <button class="uniform-btn export" id="importSpawnablesBtn">Загрузить cfgspawnabletypes</button>
                <button class="uniform-btn export" id="importPresetsBtn">Загрузить cfgrandompresets</button>
            </div>

            <div class="btn-group">
                <button class="uniform-btn export" id="exportBtn">Сохранить XML</button>
                <button class="uniform-btn danger" id="clearAllBtn">Очистить</button>
            </div>

            <div class="type-list" id="typeList"></div>
        </aside>

        <main class="editor">
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="editor">Редактор</button>
                <button class="tab-btn" data-tab="preview">Preview XML</button>
                <button class="tab-btn" data-tab="stats">Статистика</button>
            </div>

            <div id="editorTab" class="tab-pane active">
                <div class="editor-scroll" id="editorContent"></div>
            </div>

            <div id="previewTab" class="tab-pane">
                <div class="xml-output" id="xmlOutput"></div>
            </div>

            <div id="statsTab" class="tab-pane">
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </main>
    </div>
</div>

<script>
const STORAGE_KEY = 'dayzCfgSpawnableTypesEditor_v11';

const state = {
    types: [],
    selectedIndex: -1,
    currentTab: 'editor',
    searchTerm: '',
    presetDefinitions: {
        cargo: [],
        attachments: []
    }
};

const $ = (selector) => document.querySelector(selector);
const $$ = (selector) => Array.from(document.querySelectorAll(selector));

const escapeHtml = (str) => String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

const escapeXmlAttr = (str) => String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');

const normalizeNumberString = (value, fallback = '0.0') => {
    const str = String(value ?? '').trim();
    if (!str) return fallback;
    const num = Number.parseFloat(str);
    return Number.isNaN(num) ? fallback : String(num);
};

const normalizeChanceString = (value, fallback = '0.1') => {
    const str = String(value ?? '').trim();
    if (!str) return fallback;
    const num = Number.parseFloat(str);
    return Number.isNaN(num) ? fallback : String(num);
};

const createInlineEntry = (kind = 'cargo') => ({
    kind,
    mode: 'inline',
    chance: '0.1',
    preset: '',
    items: [{ name: 'ExampleItem', chance: '' }]
});

const createPresetEntry = (kind = 'cargo') => ({
    kind,
    mode: 'preset',
    chance: '',
    preset: '',
    items: []
});

const createTypeTemplate = () => ({
    name: `NewType_${state.types.length + 1}`,
    hoarder: false,
    damage: {
        enabled: false,
        min: '0.0',
        max: '0.0'
    },
    tags: [],
    cargo: [],
    attachments: []
});

function cloneDeep(obj) {
    return JSON.parse(JSON.stringify(obj));
}

function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        types: state.types,
        selectedIndex: state.selectedIndex,
        presetDefinitions: state.presetDefinitions
    }));
}

function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
        const parsed = JSON.parse(raw);
        state.types = Array.isArray(parsed.types) ? parsed.types : [];
        state.selectedIndex = typeof parsed.selectedIndex === 'number' ? parsed.selectedIndex : -1;
        state.presetDefinitions = parsed.presetDefinitions || { cargo: [], attachments: [] };
        if (state.selectedIndex >= state.types.length) {
            state.selectedIndex = state.types.length - 1;
        }
    } catch (e) {
        console.warn('Не удалось загрузить сохранённые данные', e);
    }
}

function getAllPresetNames() {
    return {
        cargo: new Set(state.presetDefinitions.cargo || []),
        attachments: new Set(state.presetDefinitions.attachments || [])
    };
}

function isValidPreset(kind, presetName) {
    if (!presetName) return false;
    const defs = getAllPresetNames();
    return defs[kind]?.has(presetName) || false;
}

function validateType(type) {
    const errors = [];

    if (!String(type.name || '').trim()) {
        errors.push('Пустое имя type');
    }

    (type.tags || []).forEach((tag, idx) => {
        if (!String(tag || '').trim()) {
            errors.push(`Пустой tag #${idx + 1}`);
        }
    });

    ['cargo', 'attachments'].forEach(kind => {
        (type[kind] || []).forEach((entry, entryIndex) => {
            if (entry.mode === 'preset') {
                if (!String(entry.preset || '').trim()) {
                    errors.push(`${kind} #${entryIndex + 1}: пустой preset`);
                } else if (!isValidPreset(kind, entry.preset)) {
                    errors.push(`${kind} #${entryIndex + 1}: missing preset "${entry.preset}"`);
                }
            } else {
                (entry.items || []).forEach((item, itemIndex) => {
                    if (!String(item.name || '').trim()) {
                        errors.push(`${kind} #${entryIndex + 1} item #${itemIndex + 1}: пустое имя`);
                    }
                });
            }
        });
    });

    return errors;
}

function renderTypeList() {
    const list = $('#typeList');

    if (!state.types.length) {
        list.innerHTML = `<div class="empty-state">Нет типов</div>`;
        return;
    }

    list.innerHTML = state.types.map((type, index) => {
        const searchBlob = [
            type.name,
            ...(type.tags || []),
            ...(type.cargo || []).map(e => e.preset || (e.items || []).map(i => i.name).join(' ')),
            ...(type.attachments || []).map(e => e.preset || (e.items || []).map(i => i.name).join(' '))
        ].join(' ').toLowerCase();

        const matches = !state.searchTerm || searchBlob.includes(state.searchTerm);
        const errors = validateType(type);
        const cargoPresetCount = (type.cargo || []).filter(e => e.mode === 'preset').length;
        const attachPresetCount = (type.attachments || []).filter(e => e.mode === 'preset').length;

        return `
            <div class="type-item ${index === state.selectedIndex ? 'active' : ''} ${matches ? '' : 'hidden'} ${errors.length ? 'invalid' : ''}" data-index="${index}" title="${escapeHtml(errors.join('; '))}">
                <strong>${escapeHtml(type.name || 'Без имени')}</strong>
                <div class="type-meta">
                    ${type.hoarder ? '<span class="meta-badge">hoarder</span>' : ''}
                    ${type.damage?.enabled ? '<span class="meta-badge">damage</span>' : ''}
                    ${(type.tags || []).length ? `<span class="meta-badge">tags: ${(type.tags || []).length}</span>` : ''}
                    ${(type.cargo || []).length ? `<span class="meta-badge">cargo: ${(type.cargo || []).length}</span>` : ''}
                    ${(type.attachments || []).length ? `<span class="meta-badge">attach: ${(type.attachments || []).length}</span>` : ''}
                    ${cargoPresetCount ? `<span class="meta-badge">cargo preset: ${cargoPresetCount}</span>` : ''}
                    ${attachPresetCount ? `<span class="meta-badge">attach preset: ${attachPresetCount}</span>` : ''}
                    ${errors.length ? `<span class="meta-badge warn">errors: ${errors.length}</span>` : `<span class="meta-badge ok">ok</span>`}
                </div>
            </div>
        `;
    }).join('');
}

function getPresetOptions(kind, selectedValue) {
    const presets = state.presetDefinitions[kind] || [];
    if (!presets.length) return '';

    const options = presets.map(name => `
        <option value="${escapeHtml(name)}" ${name === selectedValue ? 'selected' : ''}>${escapeHtml(name)}</option>
    `).join('');

    return `
        <div class="form-group">
            <label>Preset selector</label>
            <select class="entry-preset-select" data-kind="${kind}" data-entry-index="__ENTRY_INDEX__">
                <option value="">-- выбрать preset --</option>
                ${options}
            </select>
        </div>
    `;
}

function renderEntryBlock(entry, entryIndex, kind) {
    const validPreset = entry.mode === 'preset' ? isValidPreset(kind, entry.preset) : null;
    const entryErrors = [];

    if (entry.mode === 'preset' && !String(entry.preset || '').trim()) {
        entryErrors.push('Пустой preset');
    }

    if (entry.mode === 'inline') {
        (entry.items || []).forEach(item => {
            if (!String(item.name || '').trim()) entryErrors.push('Пустой item');
        });
    }

    let selectorHtml = '';
    if (entry.mode === 'preset' && state.presetDefinitions[kind]?.length) {
        selectorHtml = getPresetOptions(kind, entry.preset).replace('__ENTRY_INDEX__', String(entryIndex));
    }

    return `
        <div class="entry-card ${entryErrors.length ? 'invalid' : ''}">
            <h5>
                <span>${kind} #${entryIndex + 1}</span>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <button class="uniform-btn neutral move-up-btn move-entry-up-btn" data-kind="${kind}" data-entry-index="${entryIndex}" title="Вверх">↑</button>
                    <button class="uniform-btn neutral move-down-btn move-entry-down-btn" data-kind="${kind}" data-entry-index="${entryIndex}" title="Вниз">↓</button>
                    <button class="uniform-btn danger remove-entry-btn" data-kind="${kind}" data-entry-index="${entryIndex}" style="max-width:120px;">Удалить</button>
                </div>
            </h5>

            <div class="inline-row-3" style="margin-bottom:10px;">
                <div class="form-group">
                    <label>Mode</label>
                    <select class="entry-mode-select" data-kind="${kind}" data-entry-index="${entryIndex}">
                        <option value="preset" ${entry.mode === 'preset' ? 'selected' : ''}>preset</option>
                        <option value="inline" ${entry.mode === 'inline' ? 'selected' : ''}>inline</option>
                    </select>
                </div>

                ${entry.mode === 'preset' ? `
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Preset name</label>
                        <input type="text" class="entry-preset-input ${!String(entry.preset || '').trim() ? 'invalid' : ''}" data-kind="${kind}" data-entry-index="${entryIndex}" value="${escapeHtml(entry.preset || '')}">
                    </div>
                ` : `
                    <div class="form-group">
                        <label>Chance</label>
                        <input type="text" class="entry-chance-input" data-kind="${kind}" data-entry-index="${entryIndex}" value="${escapeHtml(entry.chance || '')}">
                    </div>
                    <div class="form-group" style="display:flex; align-items:end;">
                        <button class="uniform-btn primary add-subitem-btn" data-kind="${kind}" data-entry-index="${entryIndex}">+ Item</button>
                    </div>
                `}
            </div>

            ${selectorHtml}

            ${entry.mode === 'preset' ? `
                <div class="validation-badge ${validPreset ? 'valid' : 'invalid'}">
                    ${validPreset ? 'Preset найден' : 'Preset отсутствует'}
                </div>
            ` : `
                ${(entry.items || []).length
                    ? entry.items.map((item, itemIndex) => `
                        <div class="subitem-card ${!String(item.name || '').trim() ? 'invalid' : ''}">
                            <h6>
                                <span>Item #${itemIndex + 1}</span>
                                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                    <button class="uniform-btn neutral move-up-btn move-item-up-btn" data-kind="${kind}" data-entry-index="${entryIndex}" data-item-index="${itemIndex}" title="Вверх">↑</button>
                                    <button class="uniform-btn neutral move-down-btn move-item-down-btn" data-kind="${kind}" data-entry-index="${entryIndex}" data-item-index="${itemIndex}" title="Вниз">↓</button>
                                    <button class="uniform-btn danger remove-subitem-btn" data-kind="${kind}" data-entry-index="${entryIndex}" data-item-index="${itemIndex}" style="max-width:120px;">Удалить</button>
                                </div>
                            </h6>

                            <div class="inline-row">
                                <div class="form-group">
                                    <label>Item name</label>
                                    <input type="text" class="subitem-name-input ${!String(item.name || '').trim() ? 'invalid' : ''}" data-kind="${kind}" data-entry-index="${entryIndex}" data-item-index="${itemIndex}" value="${escapeHtml(item.name || '')}">
                                </div>
                                <div class="form-group">
                                    <label>Chance (optional)</label>
                                    <input type="text" class="subitem-chance-input" data-kind="${kind}" data-entry-index="${entryIndex}" data-item-index="${itemIndex}" value="${escapeHtml(item.chance || '')}">
                                </div>
                            </div>
                        </div>
                    `).join('')
                    : '<div class="empty-state">Нет item</div>'
                }
            `}
        </div>
    `;
}

    container.innerHTML = `
        <div class="block-card ${errors.length ? 'invalid' : ''}">
            <h4>
                <span>Основные параметры</span>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">

                    <button class="uniform-btn neutral move-down-btn" id="moveTypeDownBtn" title="Вниз">↓</button>

function renderXmlPreview() {
    $('#xmlOutput').textContent = generateXml();
}

function renderStats() {
    const totalTypes = state.types.length;
    const hoarderCount = state.types.filter(t => t.hoarder).length;
    const damageCount = state.types.filter(t => t.damage?.enabled).length;
    const totalTags = state.types.reduce((sum, t) => sum + (t.tags?.length || 0), 0);
    const totalCargo = state.types.reduce((sum, t) => sum + (t.cargo?.length || 0), 0);
    const totalAttachments = state.types.reduce((sum, t) => sum + (t.attachments?.length || 0), 0);
    const invalidTypes = state.types.filter(t => validateType(t).length > 0).length;

    const missingCargoPresets = state.types.reduce((sum, t) => {
        return sum + (t.cargo || []).filter(e => e.mode === 'preset' && !isValidPreset('cargo', e.preset)).length;
    }, 0);

    const missingAttachmentPresets = state.types.reduce((sum, t) => {
        return sum + (t.attachments || []).filter(e => e.mode === 'preset' && !isValidPreset('attachments', e.preset)).length;
    }, 0);

    $('#statsGrid').innerHTML = `
        <div class="stat-card"><strong>${totalTypes}</strong><span>Всего type</span></div>
        <div class="stat-card"><strong>${hoarderCount}</strong><span>Hoarder type</span></div>
        <div class="stat-card"><strong>${damageCount}</strong><span>Damage blocks</span></div>
        <div class="stat-card"><strong>${totalTags}</strong><span>Всего tags</span></div>
        <div class="stat-card"><strong>${totalCargo}</strong><span>Cargo entries</span></div>
        <div class="stat-card"><strong>${totalAttachments}</strong><span>Attachments entries</span></div>
        <div class="stat-card"><strong>${missingCargoPresets}</strong><span>Missing cargo presets</span></div>
        <div class="stat-card"><strong>${missingAttachmentPresets}</strong><span>Missing attachment presets</span></div>
        <div class="stat-card"><strong>${invalidTypes}</strong><span>Type с ошибками</span></div>
    `;
}

function renderAll() {
    renderTypeList();
    renderEditor();
    renderXmlPreview();
    renderStats();
    saveState();
}

function getSelectedType() {
    return state.types[state.selectedIndex] || null;
}

function moveArrayItem(arr, from, to) {
    if (to < 0 || to >= arr.length) return;
    const [item] = arr.splice(from, 1);
    arr.splice(to, 0, item);
}

function bindEditorEvents() {
    const type = getSelectedType();
    if (!type) return;

    $('#typeNameInput')?.addEventListener('input', (e) => {
        type.name = e.target.value;
        renderAll();
    });

    $('#hoarderCheckbox')?.addEventListener('change', (e) => {
        type.hoarder = e.target.checked;
        renderAll();
    });

    $('#damageEnabledCheckbox')?.addEventListener('change', (e) => {
        type.damage.enabled = e.target.checked;
        renderAll();
    });

    $('#damageMinInput')?.addEventListener('input', (e) => {
        type.damage.min = e.target.value;
        renderAll();
    });

    $('#damageMaxInput')?.addEventListener('input', (e) => {
        type.damage.max = e.target.value;
        renderAll();
    });

    $('#deleteTypeBtn')?.addEventListener('click', () => {
        state.types.splice(state.selectedIndex, 1);
        if (state.selectedIndex >= state.types.length) {
            state.selectedIndex = state.types.length - 1;
        }
        renderAll();
    });

    $('#cloneTypeBtn')?.addEventListener('click', () => {
        const clone = cloneDeep(type);
        clone.name = `${clone.name || 'Type'}_copy`;
        state.types.splice(state.selectedIndex + 1, 0, clone);
        state.selectedIndex += 1;
        renderAll();
    });

    $('#moveTypeUpBtn')?.addEventListener('click', () => {
        if (state.selectedIndex <= 0) return;
        moveArrayItem(state.types, state.selectedIndex, state.selectedIndex - 1);
        state.selectedIndex -= 1;
        renderAll();
    });

    $('#moveTypeDownBtn')?.addEventListener('click', () => {
        if (state.selectedIndex >= state.types.length - 1) return;
        moveArrayItem(state.types, state.selectedIndex, state.selectedIndex + 1);
        state.selectedIndex += 1;
        renderAll();
    });

    $('#addTagBtn')?.addEventListener('click', () => {
        type.tags.push('new_tag');
        renderAll();
    });

    $$('.tag-input').forEach(input => {
        input.addEventListener('input', () => {
            const idx = Number.parseInt(input.dataset.tagIndex, 10);
            type.tags[idx] = input.value;
            renderAll();
        });
    });

    $$('.remove-tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const idx = Number.parseInt(btn.dataset.tagIndex, 10);
            type.tags.splice(idx, 1);
            renderAll();
        });
    });

    $('#addCargoPresetBtn')?.addEventListener('click', () => {
        type.cargo.push(createPresetEntry('cargo'));
        renderAll();
    });

    $('#addCargoInlineBtn')?.addEventListener('click', () => {
        type.cargo.push(createInlineEntry('cargo'));
        renderAll();
    });

    $('#addAttachmentsPresetBtn')?.addEventListener('click', () => {
        type.attachments.push(createPresetEntry('attachments'));
        renderAll();
    });

    $('#addAttachmentsInlineBtn')?.addEventListener('click', () => {
        type.attachments.push(createInlineEntry('attachments'));
        renderAll();
    });

    $$('.remove-entry-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const kind = btn.dataset.kind;
            const entryIndex = Number.parseInt(btn.dataset.entryIndex, 10);
            type[kind].splice(entryIndex, 1);
            renderAll();
        });
    });

    $$('.move-entry-up-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const kind = btn.dataset.kind;
            const entryIndex = Number.parseInt(btn.dataset.entryIndex, 10);
            if (entryIndex <= 0) return;
            moveArrayItem(type[kind], entryIndex, entryIndex - 1);
            renderAll();
        });
    });

    $$('.move-entry-down-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const kind = btn.dataset.kind;
            const entryIndex = Number.parseInt(btn.dataset.entryIndex, 10);
            if (entryIndex >= type[kind].length - 1) return;
            moveArrayItem(type[kind], entryIndex, entryIndex + 1);
            renderAll();
        });
    });

    $$('.entry-mode-select').forEach(select => {
        select.addEventListener('change', () => {
            const kind = select.dataset.kind;
            const entryIndex = Number.parseInt(select.dataset.entryIndex, 10);
            const current = type[kind][entryIndex];

            if (select.value === 'preset') {
                type[kind][entryIndex] = {
                    kind,
                    mode: 'preset',
                    preset: current.preset || '',
                    chance: '',
                    items: []
                };
            } else {
                type[kind][entryIndex] = {
                    kind,
                    mode: 'inline',
                    chance: current.chance || '0.1',
                    preset: '',
                    items: current.items?.length ? current.items : [{ name: 'ExampleItem', chance: '' }]
                };
            }
            renderAll();
        });
    });

    $$('.entry-preset-input').forEach(input => {
        input.addEventListener('input', () => {
            const kind = input.dataset.kind;
            const entryIndex = Number.parseInt(input.dataset.entryIndex, 10);
            type[kind][entryIndex].preset = input.value;
            renderAll();
        });
    });

    $$('.entry-preset-select').forEach(select => {
        select.addEventListener('change', () => {
            const kind = select.dataset.kind;
            const entryIndex = Number.parseInt(select.dataset.entryIndex, 10);
            type[kind][entryIndex].preset = select.value;
            renderAll();
        });
    });

    $$('.entry-chance-input').forEach(input => {
        input.addEventListener('input', () => {
            const kind = input.dataset.kind;
            const entryIndex = Number.parseInt(input.dataset.entryIndex, 10);
            type[kind][entryIndex].chance = input.value;
            renderAll();
        });
    });

    $$('.add-subitem-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const kind = btn.dataset.kind;
            const entryIndex = Number.parseInt(btn.dataset.entryIndex, 10);
            type[kind][entryIndex].items.push({ name: 'NewItem', chance: '' });
            renderAll();
        });
    });

    $$('.remove-subitem-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const kind = btn.dataset.kind;
            const entryIndex = Number.parseInt(btn.dataset.entryIndex, 10);
            const itemIndex = Number.parseInt(btn.dataset.itemIndex, 10);
            type[kind][entryIndex].items.splice(itemIndex, 1);
            renderAll();
        });
    });

    $$('.move-item-up-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const kind = btn.dataset.kind;
            const entryIndex = Number.parseInt(btn.dataset.entryIndex, 10);
            const itemIndex = Number.parseInt(btn.dataset.itemIndex, 10);
            const items = type[kind][entryIndex].items;
            if (itemIndex <= 0) return;
            moveArrayItem(items, itemIndex, itemIndex - 1);
            renderAll();
        });
    });

    $$('.move-item-down-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const kind = btn.dataset.kind;
            const entryIndex = Number.parseInt(btn.dataset.entryIndex, 10);
            const itemIndex = Number.parseInt(btn.dataset.itemIndex, 10);
            const items = type[kind][entryIndex].items;
            if (itemIndex >= items.length - 1) return;
            moveArrayItem(items, itemIndex, itemIndex + 1);
            renderAll();
        });
    });

    $$('.subitem-name-input').forEach(input => {
        input.addEventListener('input', () => {
            const kind = input.dataset.kind;
            const entryIndex = Number.parseInt(input.dataset.entryIndex, 10);
            const itemIndex = Number.parseInt(input.dataset.itemIndex, 10);
            type[kind][entryIndex].items[itemIndex].name = input.value;
            renderAll();
        });
    });

    $$('.subitem-chance-input').forEach(input => {
        input.addEventListener('input', () => {
            const kind = input.dataset.kind;
            const entryIndex = Number.parseInt(input.dataset.entryIndex, 10);
            const itemIndex = Number.parseInt(input.dataset.itemIndex, 10);
            type[kind][entryIndex].items[itemIndex].chance = input.value;
            renderAll();
        });
    });
}

function generateXml() {
    let xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes" ?>\n\n<spawnabletypes>\n`;

    state.types.forEach(type => {
        xml += `\t<type name="${escapeXmlAttr(type.name || 'UnnamedType')}">\n`;

        if (type.hoarder) {
            xml += `\t\t<hoarder />\n`;
        }

        if (type.damage?.enabled) {
            xml += `\t\t<damage min="${escapeXmlAttr(normalizeNumberString(type.damage.min, '0.0'))}" max="${escapeXmlAttr(normalizeNumberString(type.damage.max, '0.0'))}" />\n`;
        }

        (type.tags || []).forEach(tag => {
            if (String(tag).trim()) {
                xml += `\t\t<tag name="${escapeXmlAttr(tag)}" />\n`;
            }
        });

        ['cargo', 'attachments'].forEach(kind => {
            (type[kind] || []).forEach(entry => {
                if (entry.mode === 'preset') {
                    if (String(entry.preset || '').trim()) {
                        xml += `\t\t<${kind} preset="${escapeXmlAttr(entry.preset)}" />\n`;
                    }
                } else {
                    xml += `\t\t<${kind} chance="${escapeXmlAttr(normalizeChanceString(entry.chance, '0.1'))}">\n`;
                    (entry.items || []).forEach(item => {
                        const itemName = String(item.name || '').trim();
                        if (!itemName) return;
                        const chance = String(item.chance || '').trim();

                        if (chance) {
                            xml += `\t\t\t<item name="${escapeXmlAttr(itemName)}" chance="${escapeXmlAttr(normalizeChanceString(chance, '0.1'))}" />\n`;
                        } else {
                            xml += `\t\t\t<item name="${escapeXmlAttr(itemName)}" />\n`;
                        }
                    });
                    xml += `\t\t</${kind}>\n`;
                }
            });
        });

        xml += `\t</type>\n`;
    });

    xml += `</spawnabletypes>`;
    return xml;
}

function parseEntryNode(node, kind) {
    const preset = node.getAttribute('preset');
    const chance = node.getAttribute('chance');

    if (preset !== null) {
        return {
            kind,
            mode: 'preset',
            preset: preset || '',
            chance: '',
            items: []
        };
    }

    return {
        kind,
        mode: 'inline',
        preset: '',
        chance: chance || '0.1',
        items: [...node.children]
            .filter(child => child.tagName === 'item')
            .map(itemNode => ({
                name: itemNode.getAttribute('name') || '',
                chance: itemNode.getAttribute('chance') || ''
            }))
    };
}

function parseSpawnableTypesXml(xmlText) {
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    if (doc.querySelector('parsererror')) {
        throw new Error('Невалидный XML');
    }

    const root = doc.documentElement;
    if (!root || root.tagName !== 'spawnabletypes') {
        throw new Error('Корневой тег должен быть <spawnabletypes>');
    }

    const types = [];

    [...root.children].forEach(typeNode => {
        if (typeNode.tagName !== 'type') return;

        const type = createTypeTemplate();
        type.name = typeNode.getAttribute('name') || '';
        type.hoarder = [...typeNode.children].some(n => n.tagName === 'hoarder');

        const damageNode = [...typeNode.children].find(n => n.tagName === 'damage');
        if (damageNode) {
            type.damage.enabled = true;
            type.damage.min = damageNode.getAttribute('min') || '0.0';
            type.damage.max = damageNode.getAttribute('max') || '0.0';
        }

        type.tags = [...typeNode.children]
            .filter(n => n.tagName === 'tag')
            .map(n => n.getAttribute('name') || '');

        type.cargo = [...typeNode.children]
            .filter(n => n.tagName === 'cargo')
            .map(node => parseEntryNode(node, 'cargo'));

        type.attachments = [...typeNode.children]
            .filter(n => n.tagName === 'attachments')
            .map(node => parseEntryNode(node, 'attachments'));

        types.push(type);
    });

    return types;
}

function parseRandomPresetsXml(xmlText) {
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    if (doc.querySelector('parsererror')) {
        throw new Error('Невалидный XML');
    }

    const root = doc.documentElement;
    if (!root || root.tagName !== 'randompresets') {
        throw new Error('Корневой тег должен быть <randompresets>');
    }

    const cargo = [];
    const attachments = [];

    [...root.children].forEach(node => {
        if (node.tagName === 'cargo') {
            const name = node.getAttribute('name');
            if (name) cargo.push(name);
        }
        if (node.tagName === 'attachments') {
            const name = node.getAttribute('name');
            if (name) attachments.push(name);
        }
    });

    state.presetDefinitions = {
        cargo: [...new Set(cargo)],
        attachments: [...new Set(attachments)]
    };
}

function importXmlFile(callback, accept = '.xml') {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = accept;

    input.addEventListener('change', (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => callback(e.target.result);
        reader.readAsText(file);
    });

    input.click();
}

function exportXml() {
    const xml = generateXml();
    const blob = new Blob([xml], { type: 'text/xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'cfgspawnabletypes.xml';
    a.click();
    URL.revokeObjectURL(url);
}

function setTab(tab) {
    state.currentTab = tab;
    $$('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
    $('#editorTab').classList.toggle('active', tab === 'editor');
    $('#previewTab').classList.toggle('active', tab === 'preview');
    $('#statsTab').classList.toggle('active', tab === 'stats');

    if (tab === 'preview') renderXmlPreview();
    if (tab === 'stats') renderStats();
}

function setupEvents() {
    $('#searchInput').addEventListener('input', (e) => {
        state.searchTerm = e.target.value.trim().toLowerCase();
        renderTypeList();
    });

    $('#addTypeBtn').addEventListener('click', () => {
        state.types.push(createTypeTemplate());
        state.selectedIndex = state.types.length - 1;
        renderAll();
    });

    $('#newFileBtn').addEventListener('click', () => {
        state.types = [];
        state.selectedIndex = -1;
        renderAll();
    });

    $('#clearAllBtn').addEventListener('click', () => {
        if (!confirm('Очистить все type?')) return;
        state.types = [];
        state.selectedIndex = -1;
        renderAll();
    });

    $('#importSpawnablesBtn').addEventListener('click', () => {
        importXmlFile((text) => {
            try {
                state.types = parseSpawnableTypesXml(text);
                state.selectedIndex = state.types.length ? 0 : -1;
                renderAll();
                alert(`Загружено type: ${state.types.length}`);
            } catch (error) {
                alert(`Ошибка импорта cfgspawnabletypes: ${error.message}`);
            }
        });
    });

    $('#importPresetsBtn').addEventListener('click', () => {
        importXmlFile((text) => {
            try {
                parseRandomPresetsXml(text);
                renderAll();
                alert(`Загружено cargo preset: ${state.presetDefinitions.cargo.length}, attachments preset: ${state.presetDefinitions.attachments.length}`);
            } catch (error) {
                alert(`Ошибка импорта cfgrandompresets: ${error.message}`);
            }
        });
    });

    $('#exportBtn').addEventListener('click', exportXml);

    document.addEventListener('click', (e) => {
        const typeItem = e.target.closest('.type-item');
        if (typeItem && typeItem.dataset.index !== undefined) {
            state.selectedIndex = Number.parseInt(typeItem.dataset.index, 10);
            renderAll();
        }

        const tabBtn = e.target.closest('.tab-btn');
        if (tabBtn) {
            setTab(tabBtn.dataset.tab);
        }
    });
}

window.addEventListener('load', () => {
    loadState();
    setupEvents();
    renderAll();
});
</script>
</body>

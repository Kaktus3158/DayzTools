<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayZ Recipe Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0f14;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(101, 67, 33, 0.1) 0px, rgba(101, 67, 33, 0.1) 2px, 
                                          rgba(70, 40, 20, 0.1) 2px, rgba(70, 40, 20, 0.1) 4px),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 L 90 10 M10 20 L 90 20 M10 30 L 90 30 M10 40 L 90 40 M10 50 L 90 50 M10 60 L 90 60 M10 70 L 90 70 M10 80 L 90 80 M10 90 L 90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/><path d="M10 10 L 10 90 M20 10 L 20 90 M30 10 L 30 90 M40 10 L 40 90 M50 10 L 50 90 M60 10 L 60 90 M70 10 L 70 90 M80 10 L 80 90 M90 10 L 90 90" stroke="%233d2b1a" stroke-width="0.5" opacity="0.2"/></svg>');
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(5px);
            border: 2px solid #7a5c3a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(101, 67, 33, 0.3);
            position: relative;
        }
        
        .container::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 2px solid rgba(170, 110, 40, 0.3);
            border-radius: 10px;
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .container::after {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px dashed rgba(170, 110, 40, 0.2);
            border-radius: 4px;
            pointer-events: none;
        }
        
        .header {
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            color: #c49a6c;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.2), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            gap: 12px;
        }
        
        .header::before {
            content: "";
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, transparent 50%, #7a5c3a 50%);
            opacity: 0.3;
        }
        
        .header h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin: 0;
            color: #c49a6c;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #3d2b1a;
            font-family: 'Segoe UI', monospace;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1;
        }

        .lang-switcher {
            display: inline-flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .lang-btn {
            min-width: 44px;
            height: 30px;
            padding: 0 10px;
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            background: #0f1a0f;
            color: #b4a68a;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.08);
        }

        .lang-btn:hover {
            border-color: #c49a6c;
            color: #c49a6c;
            background: #162216;
        }

        .lang-btn.active {
            border-color: #c49a6c;
            color: #c49a6c;
            background: #1f2f1f;
            box-shadow: 0 0 10px rgba(196,154,108,0.18), inset 0 1px 3px rgba(255,215,140,0.12);
        }
        
        .main-content {
            display: flex;
            gap: 20px;
        }
        
        .sidebar {
            width: 300px;
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            padding: 15px;
            border-radius: 5px;
            flex-shrink: 0;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        .sidebar::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path d="M1 3 L1 4 M2 2 L2 3 M3 1 L3 2 M0 0 L0 1" stroke="%23aa6e40" stroke-width="0.5" opacity="0.1"/></svg>');
            pointer-events: none;
        }
        
        .sidebar h3 {
            color: #c49a6c;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #5a4a3a;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 #3d2b1a;
        }
        
        .editor {
            flex: 1;
            background: #1e2b1e;
            background-image: linear-gradient(145deg, #2a3a2a 0%, #1a251a 100%);
            border-radius: 5px;
            min-width: 0;
            border: 2px solid #5a4a3a;
            padding: 15px;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1), 0 5px 10px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .editor::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path d="M1 3 L1 4 M2 2 L2 3 M3 1 L3 2 M0 0 L0 1" stroke="%23aa6e40" stroke-width="0.5" opacity="0.1"/></svg>');
            pointer-events: none;
        }
        
        .uniform-input,
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #5a4a3a;
            border-radius: 3px;
            font-size: 13px;
            line-height: normal;
            box-sizing: border-box;
            background: #0f1a0f;
            color: #d4c8b0;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Segoe UI', monospace;
        }
        
        .uniform-input:focus,
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #c49a6c;
            box-shadow: 0 0 0 2px rgba(196, 154, 108, 0.2);
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Segoe UI', monospace;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            height: 32px;
        }
        
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
            accent-color: #c49a6c;
            background: #0f1a0f;
            border: 1px solid #5a4a3a;
        }
        
        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #b4a68a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        
        .checkbox-label label {
            margin-bottom: 0;
            cursor: pointer;
        }
        
        .uniform-btn {
            padding: 8px 12px;
            border: 2px solid #5a4a3a;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            background: #1e2b1e;
            color: #c49a6c;
            box-shadow: 0 3px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .uniform-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(196,154,108,0.2), transparent);
            transition: left 0.3s;
        }
        
        .uniform-btn:hover::before {
            left: 100%;
        }
        
        .uniform-btn:hover {
            border-color: #c49a6c;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.3);
        }
        
        .uniform-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3d2b1a, inset 0 1px 3px rgba(255,215,140,0.2);
        }
        
        .uniform-btn.block {
            width: 100%;
        }
        
        .uniform-btn.primary {
            background: #1e3a1e;
            border-color: #2a6b2a;
        }
        
        .uniform-btn.primary:hover {
            border-color: #27ae60;
        }
        
        .uniform-btn.secondary {
            background: #3a2a1e;
            border-color: #8b5a2a;
        }
        
        .uniform-btn.secondary:hover {
            border-color: #e67e22;
        }
        
        .uniform-btn.export {
            background: #1e2a3a;
            border-color: #2a4a6b;
        }
        
        .uniform-btn.export:hover {
            border-color: #3498db;
        }
        
        .uniform-btn.import {
            background: #3a2a1e;
            border-color: #b87c3a;
        }
        
        .uniform-btn.import:hover {
            border-color: #f39c12;
        }
        
        .uniform-btn.danger {
            background: #3a1e1e;
            border-color: #8b2a2a;
        }
        
        .uniform-btn.danger:hover {
            border-color: #e74c3c;
        }
        
        .uniform-btn.neutral {
            background: #2a2a2a;
            border-color: #5a5a5a;
        }
        
        .uniform-btn.neutral:hover {
            border-color: #7f8c8d;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
            margin: 15px 0;
        }
        
        .btn-group .uniform-btn {
            flex: 1;
            margin: 0;
        }
        
        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            border-bottom: 2px solid #5a4a3a;
            padding-bottom: 10px;
        }
        
        .tab-btn {
            padding: 8px 12px;
            background: #1e2b1e;
            border: 2px solid #5a4a3a;
            cursor: pointer;
            font-size: 13px;
            color: #b4a68a;
            border-radius: 3px;
            transition: all 0.2s;
            height: 36px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            font-weight: 600;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .tab-btn:hover {
            background: #2a3a2a;
            border-color: #7a5c3a;
            color: #d4c8b0;
        }
        
        .tab-btn.active {
            background: #2a3a2a;
            border-color: #c49a6c;
            color: #c49a6c;
            box-shadow: 0 0 10px rgba(196,154,108,0.3);
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        .card-container {
            max-height: 500px;
            overflow-y: auto;
            border: 2px solid #5a4a3a;
            border-radius: 3px;
            padding: 15px;
            background: #0f1a0f;
            margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }
        
        .ingredient-card,
        .case-card,
        .result-item {
            background: #1e2b1e;
            border-radius: 3px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #5a4a3a;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,215,140,0.1);
            position: relative;
        }
        
        .ingredient-card::after,
        .case-card::after,
        .result-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><path d="M1 3 L1 4 M2 2 L2 3 M3 1 L3 2 M0 0 L0 1" stroke="%23aa6e40" stroke-width="0.5" opacity="0.1"/></svg>');
            pointer-events: none;
        }
        
        .ingredient-card h4,
        .case-card h4,
        .result-item h5 {
            color: #c49a6c;
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #3d2b1a;
        }
        
        .result-item h5 {
            font-size: 13px;
        }
        
        .case-header {
            background: #2a3a2a;
            color: #c49a6c;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border: 1px solid #5a4a3a;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 3px rgba(255,215,140,0.1);
        }
        
        .preview-section {
            background: #0f1a0f;
            border-radius: 3px;
            padding: 15px;
            border: 1px solid #5a4a3a;
        }
        
        .preview-title {
            font-size: 16px;
            font-weight: bold;
            color: #c49a6c;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #5a4a3a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .preview-block {
            margin-bottom: 15px;
        }
        
        .preview-block h4 {
            color: #b4a68a;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .preview-ingredient,
        .preview-case {
            background: #1e2b1e;
            border-radius: 3px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #c49a6c;
            border-top: 1px solid #5a4a3a;
            border-right: 1px solid #5a4a3a;
            border-bottom: 1px solid #5a4a3a;
        }
        
        .preview-case {
            border-left-color: #e67e22;
        }
        
        .preview-class-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 8px 0;
        }
        
        .preview-class-item {
            background: #0f1a0f;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 11px;
            border: 1px solid #5a4a3a;
            color: #d4c8b0;
        }
        
        .preview-param-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
            color: #b4a68a;
        }
        
        .preview-param strong {
            color: #c49a6c;
        }
        
        .preview-result-item {
            background: #0f1a0f;
            padding: 8px 10px;
            margin-bottom: 5px;
            border-radius: 3px;
            font-size: 11px;
            border: 1px solid #5a4a3a;
            color: #d4c8b0;
        }
        
        .preview-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 10px;
            margin-left: 5px;
            background: #1e3a1e;
            border: 1px solid #27ae60;
            color: #27ae60;
        }
        
        .preview-stats {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #5a4a3a;
            flex-wrap: wrap;
        }
        
        .preview-stats .stat-item {
            background: #1e2b1e;
            padding: 5px 12px;
            border-radius: 3px;
            font-size: 12px;
            border: 1px solid #5a4a3a;
            color: #b4a68a;
        }
        
        .code-output {
            background: #0f1a0f;
            color: #d4c8b0;
            padding: 15px;
            border-radius: 3px;
            margin-top: 15px;
            font-family: 'Segoe UI', monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.4;
            border: 2px solid #5a4a3a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }
        
        .registration-code {
            background: #0f1a0f;
            color: #d4c8b0;
            padding: 12px;
            border-radius: 3px;
            margin-top: 15px;
            font-family: 'Segoe UI', monospace;
            font-size: 12px;
            border: 1px solid #5a4a3a;
        }
        
        .comment {
            color: #7a5c3a;
        }
        
        .editor h3 {
            color: #c49a6c;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #5a4a3a;
            padding-bottom: 8px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 data-i18n="editorTitle">RECIPE EDITOR</h2>
            <div class="header-right">
                <div class="lang-switcher" data-i18n-aria-label="languageSwitcherAria" aria-label="Language switcher">
                    <button class="lang-btn" type="button" data-lang="ru">RU</button>
                    <button class="lang-btn" type="button" data-lang="en">EN</button>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="sidebar">
                <h3 data-i18n="recipeParamsTitle">Параметры рецепта</h3>
                
                <div class="form-group">
                    <label
                        data-i18n="labelClassName"
                        data-i18n-title="titleClassName"
                        title="Наименование класса рецепта для регистрации. Один рецепт - один класс. Должно быть уникальным в рамках мода."
                    >RecipeclassName:</label>
                    <input type="text" id="className" value="" placeholder="CraftWeaponCleaner" data-i18n-placeholder="placeholderClassName">
                </div>
                
                <div class="form-group">
                    <label
                        data-i18n="labelRecipeName"
                        data-i18n-title="titleRecipeName"
                        title="Наименование рецепта, которое будет отображаться в игре."
                    >recipeName:</label>
                    <input type="text" id="recipeName" value="" placeholder="Мой рецепт" data-i18n-placeholder="placeholderRecipeName">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label
                            data-i18n="labelInstaRecipe"
                            data-i18n-title="titleInstaRecipe"
                            title="true - крафт происходит мгновенно без анимации. false - с анимацией крафта."
                        >InstaRecipe:</label>
                        <select id="isInstaRecipe">
                            <option value="true">true</option>
                            <option value="false">false</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label
                            data-i18n="labelAnimation"
                            data-i18n-title="titleAnimation"
                            title="Длительность анимации в относительных единицах. Реальные секунды = значение * 4 приблизительно."
                        >Animation:</label>
                        <input type="number" id="animationLength" value="1" step="0.1" min="0">
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="uniform-btn primary" id="newRecipeBtn" data-i18n="btnNew" data-i18n-title="titleNewRecipe" title="Создать новый рецепт со значениями по умолчанию">Новый</button>
                    <button class="uniform-btn secondary" id="clearRecipeBtn" data-i18n="btnClear" data-i18n-title="titleClearRecipe" title="Очистить все поля рецепта">Очистить</button>
                </div>

        const $$ = (selector) => Array.from(document.querySelectorAll(selector));

        const t = (key) => translations[currentLang]?.[key] ?? translations.ru[key] ?? key;

        const escapeHtml = (str) => String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const getIngredientTemplate = () => ({
            classList: "",
            minDamage: -1,
            maxDamage: 3,
            minQuantity: 1,
            maxQuantity: -1,
            addHealth: 0,
            setHealth: -1,
            addQuantity: -1,
            destroy: false
        });

        const getResultTemplate = () => ({
            type: "",
            setFullQuantity: false,
            setQuantity: 1,
            setHealth: -1,
            inheritsHealth: -1,
            inheritsColor: -1,
            toInventory: -1,
            replacesIngredient: -1
        });

        const getCaseTemplate = () => ({
            results: [getResultTemplate()]
        });

        const parseClassList = (text) => String(text || '')
            .split('\n')
            .map(line => line.trim())
            .filter(Boolean);

        function applyLanguage(lang) {
            currentLang = translations[lang] ? lang : 'ru';
            localStorage.setItem(LANG_STORAGE_KEY, currentLang);

            document.documentElement.lang = currentLang;
            document.title = t('pageTitle');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                el.textContent = t(key);
            });

            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.dataset.i18nTitle;
                el.title = t(key);
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.dataset.i18nPlaceholder;
                el.placeholder = t(key);
            });

            document.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
                const key = el.dataset.i18nAriaLabel;
                el.setAttribute('aria-label', t(key));
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });

            if ($('#codeOutput').textContent.trim() === '// Нажмите "Сгенерировать код"' || $('#codeOutput').textContent.trim() === '// Click "Generate Code"') {
                $('#codeOutput').textContent = t('codePlaceholder');
            }

            if ($('#codeOutput').textContent.trim() === '// Рецепт очищен' || $('#codeOutput').textContent.trim() === '// Recipe cleared') {
                $('#codeOutput').textContent = t('codeCleared');
            }

            renderAll();

            if ($('#registrationContainer').style.display !== 'none' && $('#className').value) {
                const registrationCode = `// RegisterRecipe(new ${$('#className').value || 'MyCustomRecipe'});`;
                $('#registrationContainer').innerHTML = `<strong>${t('registrationLabel')}</strong><br><span class="comment">${registrationCode}</span>`;
            }
        }

        function getFormValues() {
            return {
                className: $('#className').value || '',
                recipeName: $('#recipeName').value || '',
                isInstaRecipe: $('#isInstaRecipe').value,
                animationLength: $('#animationLength').value || '1'
            };
        }

        function setFormDefaults() {
            $('#className').value = '';
            $('#recipeName').value = '';
            $('#isInstaRecipe').value = 'true';
            $('#animationLength').value = '1';
        }

        function clearRecipe() {
            state.ingredients = [];
            state.cases = [];
            setFormDefaults();
            renderAll();
            $('#codeOutput').textContent = t('codePlaceholder');
            $('#registrationContainer').style.display = 'none';
        }

        function createNewRecipe() {
            state.ingredients = [];
            state.cases = [getCaseTemplate()];
            setFormDefaults();
            renderAll();
            $('#codeOutput').textContent = t('codePlaceholder');
            $('#registrationContainer').style.display = 'none';
            showTab('ingredients');
        }

        function renderIngredients() {
            const container = $('#ingredientsContainer');
            container.innerHTML = '';

            if (!state.ingredients.length) {
                container.innerHTML = `<p style="color: #7a5c3a; text-align: center; padding: 20px;">${escapeHtml(t('emptyIngredients'))}</p>`;
                return;
            }

            container.innerHTML = state.ingredients.map((ing, index) => `
                <div class="ingredient-card">
                    <h4>
                        ${escapeHtml(t('ingredientCardTitle'))} #${index + 1}
                        <button class="uniform-btn danger remove-ingredient-btn" data-index="${index}" style="width: 28px; height: 28px; padding: 0;">×</button>
                    </h4>

                    <div class="form-group">
                        <label title="${escapeHtml(t('titleIngredientClassList'))}">${escapeHtml(t('labelIngredientClassList'))}</label>
                        <textarea class="ingredient-input" data-index="${index}" data-field="classList" placeholder="${escapeHtml(t('placeholderIngredientClassList'))}">${escapeHtml(ing.classList)}</textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label title="${escapeHtml(t('titleMinDamage'))}">${escapeHtml(t('labelMinDamage'))}</label>
                            <input type="number" class="ingredient-input" data-index="${index}" data-field="minDamage" value="${ing.minDamage}">
                        </div>
                        <div class="form-group">
                            <label title="${escapeHtml(t('titleMaxDamage'))}">${escapeHtml(t('labelMaxDamage'))}</label>
                            <input type="number" class="ingredient-input" data-index="${index}" data-field="maxDamage" value="${ing.maxDamage}">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label title="${escapeHtml(t('titleMinQuantity'))}">${escapeHtml(t('labelMinQuantity'))}</label>
                            <input type="number" class="ingredient-input" data-index="${index}" data-field="minQuantity" value="${ing.minQuantity}">
                        </div>
                        <div class="form-group">
                            <label title="${escapeHtml(t('titleMaxQuantity'))}">${escapeHtml(t('labelMaxQuantity'))}</label>
                            <input type="number" class="ingredient-input" data-index="${index}" data-field="maxQuantity" value="${ing.maxQuantity}">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label title="${escapeHtml(t('titleAddHealth'))}">${escapeHtml(t('labelAddHealth'))}</label>
                            <input type="number" class="ingredient-input" data-index="${index}" data-field="addHealth" value="${ing.addHealth}">
                        </div>
                        <div class="form-group">
                            <label title="${escapeHtml(t('titleSetHealth'))}">${escapeHtml(t('labelSetHealth'))}</label>
                            <input type="number" class="ingredient-input" data-index="${index}" data-field="setHealth" value="${ing.setHealth}">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label title="${escapeHtml(t('titleAddQuantity'))}">${escapeHtml(t('labelAddQuantity'))}</label>
                            <input type="number" class="ingredient-input" data-index="${index}" data-field="addQuantity" value="${ing.addQuantity}">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group checkbox-label">
                            <input type="checkbox" class="ingredient-checkbox" data-index="${index}" data-field="destroy" id="destroy_${index}" ${ing.destroy ? 'checked' : ''}>
                            <label for="destroy_${index}" title="${escapeHtml(t('titleDestroy'))}">${escapeHtml(t('labelDestroy'))}</label>
                        </div>
                    </div>
                </div>
            `).join('');
        }

            const container = $('#casesContainer');
            container.innerHTML = '';

            if (!state.cases.length) {
                container.innerHTML = `<p style="color: #7a5c3a; text-align: center; padding: 20px;">${escapeHtml(t('emptyCases'))}</p>`;

                    <div class="case-header">
                        ${escapeHtml(t('resultCaseTitle'))} #${caseIndex + 1}
                        <button class="uniform-btn danger remove-case-btn" data-case-index="${caseIndex}" style="width: 28px; height: 28px; padding: 0;">×</button>
                    </div>

                    ${caseItem.results.map((result, resultIndex) => `
                        <div class="result-item">
                            <h5>
                                ${escapeHtml(t('resultTitle'))} #${resultIndex + 1}
                                <button class="uniform-btn danger remove-result-btn" data-case-index="${caseIndex}" data-result-index="${resultIndex}" style="width: 24px; height: 24px; padding: 0;">×</button>
                            </h5>

                            <div class="form-group">
                                <label title="${escapeHtml(t('titleResultType'))}">${escapeHtml(t('labelResultType'))}</label>
                                <input type="text" class="result-input" data-case-index="${caseIndex}" data-result-index="${resultIndex}" data-field="type" value="${escapeHtml(result.type)}" placeholder="${escapeHtml(t('placeholderResultType'))}">
                            </div>

                            <div class="form-row">
                                <div class="form-group checkbox-label">
                                    <input type="checkbox" class="result-checkbox" data-case-index="${caseIndex}" data-result-index="${resultIndex}" data-field="setFullQuantity" id="full_${caseIndex}_${resultIndex}" ${result.setFullQuantity ? 'checked' : ''}>
                                    <label for="full_${caseIndex}_${resultIndex}" title="${escapeHtml(t('titleFullQuantity'))}">${escapeHtml(t('labelFullQuantity'))}</label>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label title="${escapeHtml(t('titleSetQuantity'))}">${escapeHtml(t('labelSetQuantity'))}</label>
                                    <input type="number" class="result-input" data-case-index="${caseIndex}" data-result-index="${resultIndex}" data-field="setQuantity" value="${result.setQuantity}">
                                </div>
                                <div class="form-group">
                                    <label title="${escapeHtml(t('titleResultSetHealth'))}">${escapeHtml(t('labelSetHealth'))}</label>
                                    <input type="number" class="result-input" data-case-index="${caseIndex}" data-result-index="${resultIndex}" data-field="setHealth" value="${result.setHealth}">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label title="${escapeHtml(t('titleInheritsHealth'))}">${escapeHtml(t('labelInheritsHealth'))}</label>
                                    <input type="number" class="result-input" data-case-index="${caseIndex}" data-result-index="${resultIndex}" data-field="inheritsHealth" value="${result.inheritsHealth}">
                                </div>
                                <div class="form-group">
                                    <label title="${escapeHtml(t('titleToInventory'))}">${escapeHtml(t('labelToInventory'))}</label>
                                    <input type="number" class="result-input" data-case-index="${caseIndex}" data-result-index="${resultIndex}" data-field="toInventory" value="${result.toInventory}">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label title="${escapeHtml(t('titleReplacesIngredient'))}">${escapeHtml(t('labelReplacesIngredient'))}</label>
                                    <input type="number" class="result-input" data-case-index="${caseIndex}" data-result-index="${resultIndex}" data-field="replacesIngredient" value="${result.replacesIngredient}">
                                </div>
                            </div>
                        </div>
                    `).join('')}

                    <button class="uniform-btn primary block add-result-btn" data-case-index="${caseIndex}" style="margin-top: 10px;">${escapeHtml(t('btnAddResult'))}</button>
                </div>
            `).join('');
        }

        function updatePreview() {
            const container = $('#previewContainer');
            if (!container) return;

            const form = getFormValues();
            const className = form.className || t('previewNotSpecified');
            const recipeName = form.recipeName || t('previewNotSpecified');

            let html = `
                <div class="preview-title">${escapeHtml(recipeName)} (${escapeHtml(className)})</div>
                
                <div class="preview-block">
                    <h4>${escapeHtml(t('previewParameters'))}</h4>
                    <div class="preview-param-grid">
                        <span class="preview-param"><strong>${escapeHtml(t('previewInstaRecipe'))}</strong> ${escapeHtml(form.isInstaRecipe)}</span>
                        <span class="preview-param"><strong>${escapeHtml(t('previewAnimationLength'))}</strong> ${escapeHtml(form.animationLength)}</span>
                    </div>
                </div>
            `;

            html += `<div class="preview-block"><h4>${escapeHtml(t('previewIngredients'))} (${state.ingredients.length}):</h4>`;

            if (!state.ingredients.length) {
                html += `<p style="color: #7a5c3a;">${escapeHtml(t('previewNoIngredients'))}</p>`;
            } else {
                state.ingredients.forEach((ing, index) => {
                    const classes = parseClassList(ing.classList);
                    const damageMin = ing.minDamage === -1 ? t('previewDamageAny') : ing.minDamage;
                    const damageMax = ing.maxDamage === -1 ? t('previewDamageAny') : ing.maxDamage;
                    const quantityMin = ing.minQuantity === -1 ? t('previewQuantityAny') : ing.minQuantity;
                    const quantityMax = ing.maxQuantity === -1 ? t('previewInfinity') : ing.maxQuantity;

                    html += `
                        <div class="preview-ingredient">
                            <strong>${escapeHtml(t('ingredientCardTitle'))} #${index + 1}</strong>
                            <div class="preview-class-list">
                                ${classes.map(cls => `<span class="preview-class-item">${escapeHtml(cls)}</span>`).join('')}
                            </div>
                            <div class="preview-param-grid">
                                <span class="preview-param"><strong>${escapeHtml(t('labelMinDamage'))}</strong> ${damageMin}</span>
                                <span class="preview-param"><strong>${escapeHtml(t('labelMaxDamage'))}</strong> ${damageMax}</span>
                                <span class="preview-param"><strong>${escapeHtml(t('labelMinQuantity'))}</strong> ${quantityMin}</span>
                                <span class="preview-param"><strong>${escapeHtml(t('labelMaxQuantity'))}</strong> ${quantityMax}</span>
                                <span class="preview-param"><strong>${escapeHtml(t('labelAddHealth'))}</strong> ${ing.addHealth}</span>
                                <span class="preview-param"><strong>${escapeHtml(t('labelSetHealth'))}</strong> ${ing.setHealth}</span>
                                <span class="preview-param"><strong>${escapeHtml(t('labelAddQuantity'))}</strong> ${ing.addQuantity}</span>
                            </div>
                            <div>
                                ${ing.destroy ? `<span class="preview-badge">${escapeHtml(t('previewDestroyed'))}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div>`;
            html += `<div class="preview-block"><h4>${escapeHtml(t('previewCases'))} (${state.cases.length}):</h4>`;

            if (!state.cases.length) {
                html += `<p style="color: #7a5c3a;">${escapeHtml(t('previewNoResults'))}</p>`;
            } else {
                state.cases.forEach((caseItem, caseIndex) => {
                    html += `
                        <div class="preview-case">
                            <strong>${escapeHtml(t('resultCaseTitle'))} #${caseIndex + 1}</strong>
                            <div class="preview-results">
                    `;

                    caseItem.results.forEach((result) => {
                        html += `
                            <div class="preview-result-item">
                                <strong>${escapeHtml(result.type || t('previewNotSpecified'))}</strong>
                                <div class="preview-param-grid">
                                    <span class="preview-param"><strong>${escapeHtml(t('labelSetQuantity'))}</strong> ${result.setQuantity}</span>
                                    <span class="preview-param"><strong>${escapeHtml(t('labelSetHealth'))}</strong> ${result.setHealth === -1 ? t('previewDefault') : result.setHealth}</span>
                                    <span class="preview-param"><strong>${escapeHtml(t('labelInheritsHealth'))}</strong> ${result.inheritsHealth}</span>
                                    <span class="preview-param"><strong>${escapeHtml(t('labelToInventory'))}</strong> ${result.toInventory}</span>
                                    ${result.setFullQuantity ? `<span class="preview-badge">${escapeHtml(t('labelFullQuantity'))}</span>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                });
            }

            html += `</div>`;

            const totalClasses = state.ingredients.reduce((sum, ing) => sum + parseClassList(ing.classList).length, 0);
            const totalResults = state.cases.reduce((sum, caseItem) => sum + caseItem.results.length, 0);

            html += `
                <div class="preview-stats">
                    <span class="stat-item">${escapeHtml(t('previewTotalClasses'))} ${totalClasses}</span>
                    <span class="stat-item">${escapeHtml(t('previewTotalResults'))} ${totalResults}</span>
                </div>
            `;

            container.innerHTML = html;
        }

        function showTab(tabName) {
            state.activeTab = tabName;
            $$('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
            $$('.tab-pane').forEach(pane => pane.classList.remove('active'));
            $(`#${tabName}Tab`).classList.add('active');

            if (tabName === 'preview') updatePreview();
        }

        function updateIngredientField(index, field, value) {
            if (!state.ingredients[index]) return;
            if (field === 'destroy') {
                state.ingredients[index][field] = value;
            } else if (field === 'classList') {
                state.ingredients[index][field] = value;
            } else {
                const parsed = Number.parseInt(value, 10);
                state.ingredients[index][field] = Number.isNaN(parsed) ? 0 : parsed;
            }
            renderIngredients();
            updatePreview();
        }

        function updateResultField(caseIndex, resultIndex, field, value) {
            const result = state.cases[caseIndex]?.results?.[resultIndex];
            if (!result) return;

            if (field === 'type') {
                result[field] = value;
            } else if (field === 'setFullQuantity') {
                result[field] = value;
            } else {
                const parsed = Number.parseInt(value, 10);
                result[field] = Number.isNaN(parsed) ? 0 : parsed;
            }

            renderCases();
            updatePreview();
        }

        function addIngredient() {
            state.ingredients.push(getIngredientTemplate());
            renderIngredients();
            updatePreview();
        }

        function removeIngredient(index) {
            state.ingredients.splice(index, 1);
            renderIngredients();
            updatePreview();
        }

        function addCase() {
            state.cases.push(getCaseTemplate());
            renderCases();
            updatePreview();
        }

        function removeCase(index) {
            state.cases.splice(index, 1);
            renderCases();
            updatePreview();
        }

        function addResultToCase(caseIndex) {
            state.cases[caseIndex].results.push(getResultTemplate());
            renderCases();
            updatePreview();
        }

        function removeResultFromCase(caseIndex, resultIndex) {
            if (state.cases[caseIndex].results.length > 1) {
                state.cases[caseIndex].results.splice(resultIndex, 1);
            }
            renderCases();
            updatePreview();
        }

        function generateCode() {
            if (!state.ingredients.length) {
                alert(t('alertAddIngredients'));
                return;
            }

            if (!state.cases.length) {
                alert(t('alertAddResults'));
                return;
            }

            const form = getFormValues();
            const className = form.className || 'MyCustomRecipe';
            const recipeName = form.recipeName || (currentLang === 'ru' ? 'Мой рецепт' : 'My Recipe');
            const isInstaRecipe = form.isInstaRecipe;
            const animationLength = form.animationLength;

            let code = `class ${className} extends RecipeBase\n{\n\toverride void Init()\n\t{\n`;
            code += `\t\tm_Name = "${recipeName}";\n`;
            code += `\t\tm_IsInstaRecipe = ${isInstaRecipe};\n`;
            code += `\t\tm_AnimationLength = ${animationLength};\n\n`;

            state.ingredients.forEach((ing, index) => {
                const classes = parseClassList(ing.classList);

                code += `\t\t//INGREDIENT #${index}\n`;
                classes.forEach(cls => {
                    code += `\t\tInsertIngredient(${index},"${cls}");\n`;
                });
                code += `\n`;

                code += `\t\tm_MinDamageIngredient[${index}] = ${ing.minDamage};\n`;
                code += `\t\tm_MaxDamageIngredient[${index}] = ${ing.maxDamage};\n`;
                code += `\t\tm_MinQuantityIngredient[${index}] = ${ing.minQuantity};\n`;
                code += `\t\tm_MaxQuantityIngredient[${index}] = ${ing.maxQuantity};\n`;
                code += `\t\tm_IngredientAddHealth[${index}] = ${ing.addHealth};\n`;
                code += `\t\tm_IngredientSetHealth[${index}] = ${ing.setHealth};\n`;
                code += `\t\tm_IngredientAddQuantity[${index}] = ${ing.addQuantity};\n`;
                code += `\t\tm_IngredientDestroy[${index}] = ${ing.destroy};\n\n`;
            });

            code += `\t}\n\n`;
            code += `\toverride bool CanDo(ItemBase ingredients[], PlayerBase player)\n\t{\n\t\treturn true;\n\t}\n\n`;
            code += `\toverride void Do(ItemBase ingredients[], PlayerBase player,array<ItemBase> results, float specialty_weight)\n\t{\n\t\tDebug.Log("Recipe Do method called","recipes");\n\t}\n\n`;
            code += `\toverride void PerformRecipe(ItemBase item1, ItemBase item2, PlayerBase player)\n\t{\n\t\tsuper.PerformRecipe(item1, item2, player);\n\t}\n\n`;
            code += `\toverride void SpawnItems(ItemBase ingredients[], PlayerBase player, array<ItemBase> spawned_objects/*out*/)\n\t{\n`;
            code += `\t\tint ing_count = m_NumberOfResults;\n`;
            code += `\t\tm_NumberOfResults = 0;\n`;
            code += `\t\tSpawn_Result();\n`;
            code += `\t\tsuper.SpawnItems(ingredients, player, spawned_objects);\n\t}\n\n`;
            code += `\tvoid Spawn_Result()\n\t{\n`;
            code += `\t\tprivate int random_result_number = Math.RandomIntInclusive(1,${state.cases.length});\n`;
            code += `\t\tswitch(random_result_number)\n\t\t{\n`;

            state.cases.forEach((caseItem, caseIndex) => {
                code += `\t\t\tcase ${caseIndex + 1}:\n\t\t\t{\n`;

                caseItem.results.forEach((result, resultIndex) => {
                    code += `\t\t\t\tAddResult("${result.type}");\n`;
                    code += `\t\t\t\tm_ResultSetFullQuantity[${resultIndex}] = ${result.setFullQuantity};\n`;
                    code += `\t\t\t\tm_ResultSetQuantity[${resultIndex}] = ${result.setQuantity};\n`;
                    code += `\t\t\t\tm_ResultSetHealth[${resultIndex}] = ${result.setHealth};\n`;
                    code += `\t\t\t\tm_ResultInheritsHealth[${resultIndex}] = ${result.inheritsHealth};\n`;
                    code += `\t\t\t\tm_ResultInheritsColor[${resultIndex}] = ${result.inheritsColor || -1};\n`;
                    code += `\t\t\t\tm_ResultToInventory[${resultIndex}] = ${result.toInventory};\n`;
                    code += `\t\t\t\tm_ResultReplacesIngredient[${resultIndex}] = ${result.replacesIngredient || -1};\n\n`;
                });

                code += `\t\t\t\tbreak;\n\t\t\t}\n\n`;
            });

            code += `\t\t}\n\t}\n};`;

            $('#codeOutput').textContent = code;

            const registrationCode = `// RegisterRecipe(new ${className});`;
            const registrationContainer = $('#registrationContainer');
            registrationContainer.innerHTML = `<strong>${t('registrationLabel')}</strong><br><span class="comment">${registrationCode}</span>`;
            registrationContainer.style.display = 'block';

            showTab('code');
        }

        function copyCode() {
            const code = $('#codeOutput').textContent;
            if (code === t('codePlaceholder') || code === t('codeCleared')) {
                alert(t('alertGenerateFirst'));
                return;
            }

            const registrationCode = `// RegisterRecipe(new ${$('#className').value || 'MyCustomRecipe'});`;
            const fullCode = code + '\n\n' + registrationCode;

            navigator.clipboard.writeText(fullCode).then(() => {
                alert(t('alertCodeCopied'));
            });
        }

        function exportRecipe() {
            if (!state.ingredients.length || !state.cases.length) {
                alert(t('alertAddIngredientsAndResults'));
                return;
            }

            generateCode();
            const code = $('#codeOutput').textContent;
            const registrationCode = `// RegisterRecipe(new ${$('#className').value || 'MyCustomRecipe'});`;
            const fullCode = code + '\n\n' + registrationCode;
            const className = $('#className').value || 'MyCustomRecipe';

            const blob = new Blob([fullCode], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${className}.c`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importRecipe() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.c,.txt';

            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();

                reader.onload = (event) => {
                    const code = event.target.result;

                    try {
                        const classNameMatch = code.match(/class\s+(\w+)\s+extends\s+RecipeBase/);
                        if (classNameMatch) $('#className').value = classNameMatch[1];

                        const nameMatch = code.match(/m_Name\s*=\s*"([^"]+)"/);
                        if (nameMatch) $('#recipeName').value = nameMatch[1];

                        const instaMatch = code.match(/m_IsInstaRecipe\s*=\s*(true|false)/);
                        if (instaMatch) $('#isInstaRecipe').value = instaMatch[1];

                        const animMatch = code.match(/m_AnimationLength\s*=\s*([\d.]+)/);
                        if (animMatch) $('#animationLength').value = animMatch[1];

                        state.ingredients = [];
                        const insertMatches = [...code.matchAll(/InsertIngredient\((\d+),\"([^\"]+)\"\)/g)];
                        const ingredientMap = new Map();

                        insertMatches.forEach(match => {
                            const index = parseInt(match[1], 10);
                            const className = match[2];

                            if (!ingredientMap.has(index)) {
                                ingredientMap.set(index, {
                                    classes: [],
                                    minDamage: -1,
                                    maxDamage: 3,
                                    minQuantity: 1,
                                    maxQuantity: -1,
                                    addHealth: 0,
                                    setHealth: -1,
                                    addQuantity: -1,
                                    destroy: false
                                });
                            }
                            ingredientMap.get(index).classes.push(className);
                        });

                        ingredientMap.forEach((value, index) => {
                            const minDamageMatch = code.match(new RegExp(`m_MinDamageIngredient\\[${index}\\]\\s*=\\s*(-?\\d+)`));
                            if (minDamageMatch) value.minDamage = parseInt(minDamageMatch[1], 10);

                            const maxDamageMatch = code.match(new RegExp(`m_MaxDamageIngredient\\[${index}\\]\\s*=\\s*(-?\\d+)`));
                            if (maxDamageMatch) value.maxDamage = parseInt(maxDamageMatch[1], 10);

                            const minQMatch = code.match(new RegExp(`m_MinQuantityIngredient\\[${index}\\]\\s*=\\s*(-?\\d+)`));
                            if (minQMatch) value.minQuantity = parseInt(minQMatch[1], 10);

                            const maxQMatch = code.match(new RegExp(`m_MaxQuantityIngredient\\[${index}\\]\\s*=\\s*(-?\\d+)`));
                            if (maxQMatch) value.maxQuantity = parseInt(maxQMatch[1], 10);

                            const addHealthMatch = code.match(new RegExp(`m_IngredientAddHealth\\[${index}\\]\\s*=\\s*(-?\\d+)`));
                            if (addHealthMatch) value.addHealth = parseInt(addHealthMatch[1], 10);

                            const setHealthMatch = code.match(new RegExp(`m_IngredientSetHealth\\[${index}\\]\\s*=\\s*(-?\\d+)`));
                            if (setHealthMatch) value.setHealth = parseInt(setHealthMatch[1], 10);

                            const addQMatch = code.match(new RegExp(`m_IngredientAddQuantity\\[${index}\\]\\s*=\\s*(-?\\d+)`));
                            if (addQMatch) value.addQuantity = parseInt(addQMatch[1], 10);

                            const destroyMatch = code.match(new RegExp(`m_IngredientDestroy\\[${index}\\]\\s*=\\s*(true|false)`));
                            if (destroyMatch) value.destroy = destroyMatch[1] === 'true';

                            value.classList = value.classes.join('\n');
                            delete value.classes;

                            state.ingredients.push(value);
                        });

                        state.cases = [];
                        const caseMatches = code.match(/case\s+\d+:\s*{([^}]+)}/g);

                        if (caseMatches) {
                            caseMatches.forEach(block => {
                                const caseResults = [];
                                const resultMatches = [...block.matchAll(/AddResult\(\"([^\"]+)\"\)/g)];

                                resultMatches.forEach(match => {
                                    const result = getResultTemplate();
                                    result.type = match[1];
                                    caseResults.push(result);
                                });

                                if (caseResults.length) {
                                    state.cases.push({ results: caseResults });
                                }
                            });
                        } else {
                            const spawnResultMatch = code.match(/void\s+Spawn_Result\(\)\s*{([^}]+)}/);
                            if (spawnResultMatch) {
                                const spawnContent = spawnResultMatch[1];
                                const resultMatches = [...spawnContent.matchAll(/AddResult\(\"([^\"]+)\"\)/g)];

                                if (resultMatches.length) {
                                    const caseResults = [];
                                    resultMatches.forEach(match => {
                                        const result = getResultTemplate();
                                        result.type = match[1];
                                        caseResults.push(result);
                                    });
                                    state.cases.push({ results: caseResults });
                                }
                            }
                        }

                        renderAll();
                        alert(t('alertRecipeLoaded'));
                    } catch (error) {
                        alert(t('alertImportError'));
                        console.error(error);
                    }
                };

                reader.readAsText(file);
            });

            input.click();
        }

        function renderAll() {
            renderIngredients();
            renderCases();
            updatePreview();
        }

        function bindEvents() {
            document.addEventListener('click', (event) => {
                const target = event.target;

                if (target.matches('.lang-btn')) {
                    applyLanguage(target.dataset.lang);
                }

                if (target.matches('#newRecipeBtn')) createNewRecipe();
                if (target.matches('#clearRecipeBtn')) clearRecipe();
                if (target.matches('#exportBtn')) exportRecipe();
                if (target.matches('#importBtn')) importRecipe();
                if (target.matches('#addIngredientBtn')) addIngredient();
                if (target.matches('#addCaseBtn')) addCase();
                if (target.matches('#generateCodeBtn')) generateCode();
                if (target.matches('#copyCodeBtn')) copyCode();

                if (target.matches('.tab-btn')) {
                    showTab(target.dataset.tab);
                }

                if (target.matches('.remove-ingredient-btn')) {
                    removeIngredient(Number.parseInt(target.dataset.index, 10));
                }

                if (target.matches('.remove-case-btn')) {
                    removeCase(Number.parseInt(target.dataset.caseIndex, 10));
                }

                if (target.matches('.add-result-btn')) {
                    addResultToCase(Number.parseInt(target.dataset.caseIndex, 10));
                }

                if (target.matches('.remove-result-btn')) {
                    removeResultFromCase(
                        Number.parseInt(target.dataset.caseIndex, 10),
                        Number.parseInt(target.dataset.resultIndex, 10)
                    );
                }
            });

            document.addEventListener('input', (event) => {
                const target = event.target;

                if (target.matches('#className, #recipeName, #isInstaRecipe, #animationLength')) {
                    updatePreview();
                }

                if (target.matches('.ingredient-input')) {
                    const index = Number.parseInt(target.dataset.index, 10);
                    const field = target.dataset.field;
                    updateIngredientField(index, field, target.value);
                }

                if (target.matches('.ingredient-checkbox')) {
                    const index = Number.parseInt(target.dataset.index, 10);
                    const field = target.dataset.field;
                    updateIngredientField(index, field, target.checked);
                }

                if (target.matches('.result-input')) {
                    const caseIndex = Number.parseInt(target.dataset.caseIndex, 10);
                    const resultIndex = Number.parseInt(target.dataset.resultIndex, 10);
                    const field = target.dataset.field;
                    updateResultField(caseIndex, resultIndex, field, target.value);
                }

                if (target.matches('.result-checkbox')) {
                    const caseIndex = Number.parseInt(target.dataset.caseIndex, 10);
                    const resultIndex = Number.parseInt(target.dataset.resultIndex, 10);
                    const field = target.dataset.field;
                    updateResultField(caseIndex, resultIndex, field, target.checked);
                }
            });
        }

        window.addEventListener('load', () => {
            clearRecipe();
            bindEvents();
            applyLanguage(currentLang);
        });
    </script>
</body>
</html>
